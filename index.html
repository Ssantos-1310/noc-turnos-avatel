const SOCIEDAD='AVATEL TELECOM, S.A.';
const ZONA='CENTRAL';
const GUARDIA_N2_IMPORTE=250;
const GUARDIA_N2_FESTIVO_IMPORTE=40;

function getWeeks2026(){
  const weeks=[];
  const jan1=new Date(2026,0,1);
  const day=jan1.getDay();
  const offset=(day===0?1:day===1?0:8-day);
  let mon=new Date(2026,0,1+offset);
  let wn=1;
  while(mon.getFullYear()<=2026){
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    const endD=sun>new Date(2026,11,31)?new Date(2026,11,31):sun;
    weeks.push({wn,start:new Date(mon),end:new Date(endD)});
    mon=new Date(mon);mon.setDate(mon.getDate()+7);
    wn++;if(wn>53)break;
  }
  return weeks;
}
const WEEKS_2026=getWeeks2026();

function weekHasFestivo(week){
  for(let i=0;i<7;i++){
    const d=new Date(week.start);d.setDate(d.getDate()+i);
    if(d.getFullYear()!==2026)continue;
    const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(festDates.has(s))return true;
  }
  return false;
}

// ── CALENDARIO N2 ─────────────────────────────────────────────────────────────
function CalN2View(){
  const today=new Date();
  // Rotación por defecto (solo si BD aún no respondió) — usa los 3 miembros ciclando
  const [assignments,setAssignments]=useState(()=>{
    const a={};WEEKS_2026.forEach((w,i)=>{a[w.wn]=N2_MEMBERS[i%N2_MEMBERS.length];});return a;
  });
  const [loaded,setLoaded]=useState(false);
  const [pendingAssign,setPendingAssign]=useState(null); // {wn, person, week}
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  // Utilidad: convierte las filas de BD en {wn: short_name}
  const rowsToMap=(rows)=>{
    const a={};
    (rows||[]).forEach(row=>{ if(row.employee?.short_name&&row.week_number) a[row.week_number]=row.employee.short_name; });
    return a;
  };

  // Carga inicial — sin ella, todo partía de una rotación falsa y el "cambio" nunca se veía reflejado
  useEffect(()=>{
    fetchN2Assignments().then(rows=>{
      const a=rowsToMap(rows);
      // Solo reemplazamos las semanas que tienen asignación en BD — conservamos la rotación por defecto
      // para semanas sin registro, así nunca queda vacío
      setAssignments(prev=>({...prev,...a}));
      setLoaded(true);
    }).catch(e=>{setErr('No se pudo cargar la asignación de guardia: '+(e?.message||e));setLoaded(true);});
  },[]);

  const assign=async(wn,person)=>{
    setSaving(true);setErr('');
    // Optimistic update — usamos el short_name (que es lo que devuelve la BD)
    const prevAssign=assignments[wn];
    setAssignments(p=>({...p,[wn]:person}));
    try{
      await saveN2Assignment(wn, person);
      // Recarga desde BD para sincronizar el summary y confirmar el cambio
      const fresh=await fetchN2Assignments();
      const a=rowsToMap(fresh);
      // IMPORTANTE: merge (no reemplazo total) — preservamos lo que no venga de BD
      setAssignments(prev=>({...prev,...a}));
    }catch(e){
      // Rollback si falla
      setAssignments(p=>({...p,[wn]:prevAssign}));
      setErr('Error al guardar: '+(e?.message||e));
    }
    setPendingAssign(null);
    setSaving(false);
  };
  const isCurrentWeek=(w)=>today>=w.start&&today<=w.end;

  const summary=N2_MEMBERS.map(name=>{
    const total=WEEKS_2026.filter(w=>assignments[w.wn]===name).length;
    const withFest=WEEKS_2026.filter(w=>assignments[w.wn]===name&&weekHasFestivo(w)).length;
    return{name,total,withFest};
  });

  return(
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:2}}>Calendario Guardia N2</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>Rotación semanal de responsables · 2026</div>
      </div>
      <div className="card" style={{marginBottom:20,padding:'16px 20px'}}>
        <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text3)',marginBottom:14}}>Resumen de guardias 2026</div>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${summary.length},1fr)`,gap:0}}>
          {summary.map((s,i)=>{
            const importe=(s.total*GUARDIA_N2_IMPORTE+s.withFest*GUARDIA_N2_FESTIVO_IMPORTE);
            const maxTotal=Math.max(...summary.map(x=>x.total))||1;
            return(
              <div key={s.name} style={{
                padding:'12px 20px',
                borderRight:i<summary.length-1?'1px solid var(--border)':'none',
                textAlign:'center'
              }}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:'var(--text)'}}>{s.name.split(' ')[0]} {s.name.split(' ')[1]}</div>
                <div style={{fontSize:32,fontWeight:700,color:'var(--orange)',lineHeight:1,marginBottom:6}}>{s.total}</div>
                <div style={{height:4,borderRadius:2,background:'var(--bg4)',marginBottom:8}}>
                  <div style={{height:'100%',borderRadius:2,background:'var(--orange)',width:`${(s.total/maxTotal)*100}%`,transition:'width .4s'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'center',gap:12,fontSize:11,color:'var(--text3)'}}>
                  <span>⚡ {s.withFest} fest.</span>
                  <span style={{color:'var(--text2)',fontWeight:500}}>{importe.toLocaleString('es-ES')}€</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="alert alert-info" style={{marginBottom:12}}>
        <span>ℹ️</span><span>Haz clic en un nombre para reasignar la guardia. ⚡ = semana con festivo incluido.{!loaded&&<span style={{marginLeft:8,color:'var(--text3)'}}>· Cargando asignaciones desde BD…</span>}</span>
      </div>
      {err&&<div className="alert alert-danger" style={{marginBottom:12}}><span>⚠</span><span>{err}</span></div>}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {Array.from({length:12},(_,mi)=>{
          const mWeeks=WEEKS_2026.filter(w=>w.start.getMonth()===mi);
          if(mWeeks.length===0)return null;
          const mTotals=N2_MEMBERS.map(name=>({
            name,
            count:mWeeks.filter(w=>assignments[w.wn]===name).length
          }));
          const mFest=mWeeks.filter(weekHasFestivo).length;
          return(
            <div key={mi}>
              {/* Cabecera de mes */}
              <div style={{
                display:'grid',gridTemplateColumns:'120px 1fr auto',gap:16,
                alignItems:'center',padding:'9px 16px',
                background:'var(--bg4)',
                borderTop:mi>0?'1px solid var(--border)':'none',
                borderBottom:'1px solid var(--border)'
              }}>
                <span style={{fontSize:11,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'.1em'}}>
                  {MN[mi]} 2026
                </span>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                  {mTotals.map(t=>(
                    <span key={t.name} style={{fontSize:11,color:'var(--text3)'}}>
                      <span style={{color:'var(--text2)',fontWeight:600}}>{t.count}</span> {t.name.split(' ')[0]}
                    </span>
                  ))}
                </div>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  {mFest>0&&<span style={{fontSize:11,color:'var(--amber)'}}>⚡ {mFest} fest.</span>}
                  <span style={{fontSize:11,color:'var(--text3)'}}>{mWeeks.length} sem.</span>
                </div>
              </div>
              {/* Filas de semanas */}
              {mWeeks.map(w=>{
                const assigned=assignments[w.wn]||N2_MEMBERS[0];
                const hasFest=weekHasFestivo(w);
                const isCur=isCurrentWeek(w);
                const imp=GUARDIA_N2_IMPORTE+(hasFest?GUARDIA_N2_FESTIVO_IMPORTE:0);
                return(
                  <div key={w.wn} style={{
                    display:'grid',gridTemplateColumns:'80px 150px 40px 1fr 80px',
                    alignItems:'center',padding:'8px 16px',
                    borderBottom:'1px solid rgba(42,51,80,.25)',
                    background:isCur?'rgba(79,142,247,.07)':'transparent',
                    transition:'background .1s'
                  }}>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,color:isCur?'var(--blue)':'var(--text3)',display:'flex',alignItems:'center',gap:6}}>
                      S{String(w.wn).padStart(2,'0')}
                      {isCur&&<span style={{fontSize:9,background:'var(--blue2)',color:'var(--blue)',padding:'1px 5px',borderRadius:8,fontFamily:'var(--font)'}}>hoy</span>}
                    </span>
                    <span style={{fontSize:12,color:'var(--text2)'}}>
                      {w.start.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – {w.end.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}
                    </span>
                    <span style={{textAlign:'center'}}>{hasFest?<span style={{color:'var(--amber)'}}>⚡</span>:<span style={{color:'var(--text3)'}}>–</span>}</span>
                    <div style={{display:'flex',gap:5}}>
                      {N2_MEMBERS.map(m=>(
                        <button key={m} onClick={()=>assigned!==m&&setPendingAssign({wn:w.wn,person:m,week:w})}
                          style={{padding:'3px 10px',borderRadius:5,border:'1px solid',fontSize:12,
                            cursor:assigned===m?'default':'pointer',transition:'all .15s',
                            borderColor:assigned===m?'var(--orange)':'var(--border)',
                            background:assigned===m?'var(--orange3)':'var(--bg3)',
                            color:assigned===m?'var(--orange)':'var(--text2)',fontWeight:assigned===m?600:400}}>
                          {m.split(' ')[0]}
                        </button>
                      ))}
                    </div>
                    <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:hasFest?'var(--amber)':'var(--text2)'}}>
                      {imp}€{hasFest&&<span style={{fontSize:10,marginLeft:3}}>(+⚡)</span>}
                    </span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {pendingAssign&&(
        <div className="modal-overlay" onClick={()=>!saving&&setPendingAssign(null)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Confirmar cambio de guardia</div>
            <div className="modal-sub">Estás a punto de reasignar la guardia N2</div>
            <div className="card" style={{background:'var(--bg3)',marginBottom:16}}>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>Semana <strong>S{String(pendingAssign.wn).padStart(2,'0')}</strong></div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>
                {pendingAssign.week.start.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – {pendingAssign.week.end.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}
                {weekHasFestivo(pendingAssign.week)&&<span style={{color:'var(--amber)',marginLeft:8}}>⚡ Semana con festivo</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,marginTop:8}}>
                <span style={{color:'var(--text3)'}}>Asignación actual:</span>
                <span style={{color:'var(--orange)',fontWeight:600}}>{assignments[pendingAssign.wn]||'—'}</span>
                <span style={{color:'var(--text3)',margin:'0 4px'}}>→</span>
                <span style={{color:'var(--green)',fontWeight:600}}>{pendingAssign.person}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setPendingAssign(null)} disabled={saving}>Cancelar</button>
              <button className="btn btn-primary" onClick={()=>assign(pendingAssign.wn,pendingAssign.person)} disabled={saving}>
                {saving?'Guardando…':'Confirmar cambio'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESUMEN RRHH ──────────────────────────────────────────────────────────────
function ResumenRRHH(){
  const today=new Date();
  const [selMonth,setSelMonth]=useState(today.getMonth());
  const [n2Assigns,setN2Assigns]=useState({});
  useEffect(()=>{
    fetchN2Assignments().then(rows=>{
      const a={};
      (rows||[]).forEach(d=>{a[d.week_number]=d.employee?.full_name||'';});
      setN2Assigns(a);
    });
  },[]);
  const [extraRows,setExtraRows]=useState([]);
  const [showAddRow,setShowAddRow]=useState(false);
  const [newRow,setNewRow]=useState({emp:'',tipo:'horas_extra',horas:'',fecha:'',desc:''});

  // Datos REALES desde Supabase (misma lógica que TeamView / CalendarView)
  const [emps,setEmps]=useState(EMPS);
  const [empShortMap,setEmpShortMap]=useState(EMP_SHORT);
  const [md,setMd]=useState({});
  const [rrhhVer,setRrhhVer]=React.useState(window.__calendarVersion||0);

  // Polling de cambios en el calendario
  useEffect(()=>{
    const iv=setInterval(()=>{const v=window.__calendarVersion||0;if(v!==rrhhVer)setRrhhVer(v);},1000);
    return()=>clearInterval(iv);
  },[rrhhVer]);

  // Lista de operadores desde BD
  useEffect(()=>{
    sb.from('employees').select('full_name,short_name,role').eq('active',true).order('full_name').then(({data})=>{
      if(data&&data.length>0){
        setEmps(data.filter(e=>e.role==='operator').map(e=>e.full_name));
        const m={};data.forEach(e=>{m[e.full_name]=e.short_name;});setEmpShortMap(m);
      }
    });
  },[]);

  // Turnos del mes seleccionado desde BD — se refresca con rrhhVer y al cambiar mes
  useEffect(()=>{
    delete shiftsCache[`2026-${String(selMonth+1).padStart(2,'0')}`];
    fetchShiftsForMonth(selMonth).then(setMd);
  },[selMonth,rrhhVer]);

  const mesNum=selMonth+1;

  const getApprover=(empName)=>{
    if(RESPONSABLES.find(r=>r.name===empName))return'Joaquín';
    return'Sergio Santos Ruiz';
  };

  const rows=useMemo(()=>{
    const result=[];
    const days=MD[selMonth];
    emps.forEach(emp=>{
      const empKey=empShortMap[emp]||EMP_SHORT[emp]||emp;
      // D shifts → Horas Extra (Mon-Sat, no festivo) o Horas Festivos (Dom o festivo)
      // N shifts → Plus NOC únicamente
      // M/T en festivo (14 días hardcodeados, NO domingos) → Complemento Festivo 40€/día
      let horasExtra=0,horasFestivos=0,plusNoc=0,compFest=0;
      const dExtraDates=[],dFestDates=[],nDates=[],mtFestDates=[];
      for(let i=0;i<days;i++){
        const shift=(md[empKey]||[])[i]||'';
        const d=new Date(2026,selMonth,i+1);
        const esFestivo=isFest(selMonth,i+1);      // solo los 14 días hardcodeados, sin domingos
        const esDomingo=d.getDay()===0;
        const dayStr=(i+1)+'/'+mesNum;
        const [baseShift,shiftNotes]=shift.split('|');
        if(baseShift==='D'){
          // Calcular horas reales desde el rango almacenado en notes ("HH:MM-HH:MM")
          const calcH=(notes)=>{
            if(!notes)return 8;
            const parts=notes.split('-');
            if(parts.length<2)return 8;
            const [sh,sm]=(parts[0]||'07:00').split(':').map(Number);
            const [eh,em]=(parts[1]||'22:00').split(':').map(Number);
            const startM=sh*60+(isNaN(sm)?0:sm);
            const endM=eh*60+(isNaN(em)?0:em);
            return Math.round((endM<=startM?(1440-startM+endM):(endM-startM))/60*10)/10;
          };
          const horas=calcH(shiftNotes);
          const esNocturno=shiftNotes?(parseInt(shiftNotes.split('-')[0])>=22||parseInt(shiftNotes.split('-')[0])<7):false;
          if(esFestivo||esDomingo||esNocturno){horasFestivos+=horas;dFestDates.push(dayStr);}
          else{horasExtra+=horas;dExtraDates.push(dayStr);}
        }
        if(baseShift==='N'){plusNoc++;nDates.push(dayStr);}
        if((baseShift==='M'||baseShift==='T')&&esFestivo){compFest++;mtFestDates.push(dayStr);}
      }
      // N2 guardias for this person this month
      const myWeeks=WEEKS_2026.filter(w=>{
        if(n2Assigns[w.wn]!==emp)return false;
        return w.start.getMonth()===selMonth||w.end.getMonth()===selMonth;
      });
      const guardiaImp=myWeeks.length*GUARDIA_N2_IMPORTE;
      const guardiaFestImp=myWeeks.filter(w=>weekHasFestivo(w)).length*GUARDIA_N2_FESTIVO_IMPORTE;
      const approver=getApprover(emp);

      if(horasExtra>0)result.push({emp,approver,tipo:'Horas Extra',horasExtra,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc:0,compFest:0,fecha:dExtraDates.slice(0,4).join(', ')||'',desc:'Horas extraordinarias (turno D)'});
      if(horasFestivos>0)result.push({emp,approver,tipo:'Horas Festivos/Noche',horasExtra:0,horasFestivos,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc:0,compFest:0,fecha:dFestDates.slice(0,4).join(', ')||'',desc:'Turno D en festivo o domingo'});
      if(guardiaImp>0)result.push({emp,approver,tipo:'Guardia N2',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:guardiaImp,guardiasFE:0,comisiones:0,km:0,plusNoc:0,compFest:0,fecha:myWeeks.map(w=>'S'+w.wn).join(', '),desc:'Guardia N2 semanal'});
      if(guardiaFestImp>0)result.push({emp,approver,tipo:'Guardia N2 Festivo',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:guardiaFestImp,comisiones:0,km:0,plusNoc:0,compFest:0,fecha:myWeeks.filter(w=>weekHasFestivo(w)).map(w=>'S'+w.wn).join(', '),desc:'Guardia N2 festivo'});
      if(plusNoc>0)result.push({emp,approver,tipo:'Plus NOC',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc,compFest:0,fecha:nDates.slice(0,4).join(', ')||'',desc:'Plus nocturnidad — '+plusNoc+' noches'});
      // Complemento festivo: una fila por cada día trabajado en festivo (requisito RRHH)
      mtFestDates.forEach(dateStr=>{
        result.push({emp,approver,tipo:'Complemento Festivo',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc:0,compFest:40,fecha:dateStr,desc:'40€ por día trabajado en festivo ('+dateStr+')'});
      });
    });
    extraRows.filter(r=>r.month===selMonth).forEach(r=>result.push(r));
    return result;
  },[selMonth,n2Assigns,extraRows,md,emps,empShortMap]);

  const COL=['MES','NOMBRE Y APELLIDOS','DNI','RESPONSABLE QUE VALIDA','Nº HORAS EXTRA','Nº HORAS FESTIVOS','Nº HORAS EXTRA - FM','Nº HORAS FESTIVOS - FM','GUARDIAS (€)','GUARDIAS FESTIVO (€)','COMISIONES (€)','KILOMETRAJE (KM)','PLUS NOC','COMP. FESTIVO (€)','FECHA Y HORA','DESCRIPCIÓN'];

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:2}}>Resumen RRHH</div>
          <div style={{fontSize:12,color:'var(--text3)'}}>Informe mensual incidencias nómina · NOC Central</div>
        </div>
        <div style={{display:'flex',gap:8,marginLeft:'auto',alignItems:'center'}}>
          <select className="fs" style={{width:'auto',fontSize:12,padding:'5px 10px'}} value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))}>
            {MN.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
          </select>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setShowAddRow(true)}>+ Entrada manual</button>
          <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>{
            // Build data array for SheetJS
            const headers=['MES','NOMBRE Y APELLIDOS','DNI','RESPONSABLE QUE VALIDA',
              'Nº HORAS EXTRA','Nº HORAS FESTIVOS','Nº HORAS EXTRA - FM','Nº HORAS FESTIVOS - FM',
              'GUARDIAS (€)','GUARDIAS FESTIVO (€)','COMISIONES (€)','KILOMETRAJE (KM)','PLUS NOC',
              'COMP. FESTIVO (€)','FECHA Y HORA','DESCRIPCIÓN DEL TRABAJO'];
            const dataRows=rows.map(r=>[
              mesNum, r.emp, '', r.approver,
              r.horasExtra||'', r.horasFestivos||'', r.horasExtraFM||'', r.horasFestFM||'',
              r.guardiasE||'', r.guardiasFE||'', r.comisiones||'', r.km||'',
              r.plusNoc||'', r.compFest||'', r.fecha||'', r.desc||''
            ]);
            const ws=XLSX.utils.aoa_to_sheet([headers,...dataRows]);
            // Column widths
            ws['!cols']=[{wch:5},{wch:30},{wch:12},{wch:25},{wch:14},{wch:16},{wch:18},{wch:20},{wch:14},{wch:18},{wch:14},{wch:16},{wch:10},{wch:16},{wch:22},{wch:40}];
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,`${MN[selMonth]}-2026`);
            XLSX.writeFile(wb,`RRHH_NOC_${MN[selMonth]}_2026.xlsx`);
          }}>↓ Exportar XLSX</button>
        </div>
      </div>
      <div className="grid-2" style={{marginBottom:16}}>
        <div className="alert alert-info" style={{marginBottom:0}}><span>📋</span><span>Tabla generada automáticamente. Revisa antes de exportar. Envío automático el día 3 del mes siguiente.</span></div>
        <div className="alert alert-warn" style={{marginBottom:0}}><span>⚡</span><span>Operadores → aprobador <strong>Sergio Santos Ruiz</strong>. Si empleado es Sergio o Alberto → aprobador <strong>Joaquín</strong>.</span></div>
      </div>
      {rows.length===0?(
        <div className="card" style={{textAlign:'center',padding:40,color:'var(--text3)'}}><div style={{fontSize:20,marginBottom:8}}>📄</div>Sin entradas para {MN[selMonth]} 2026</div>
      ):(
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{background:'var(--bg3)'}}>
                  {COL.map(h=>(

// ── ADMIN REQ ITEM ─────────────────────────────────────────────────────────────
// Un ítem en la lista de solicitudes pendientes del admin.
// Para cambios de turno multi-día muestra los pares expandibles y aprueba/rechaza el grupo atómicamente.
function AdminReqItem({r,currentUserId,onResolved}){
  const [expanded,setExpanded]=useState(false);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');

  const tagColor=r.type==='cambio'?{bg:'var(--blue3)',fg:'var(--blue)'}:r.type==='asuntos'?{bg:'var(--orange3)',fg:'var(--orange)'}:{bg:'var(--green2)',fg:'var(--green)'};
  const tagLabel=r.type==='cambio'?(r.isGroup?`Cambio turno · ${r.pairs.length} días`:'Cambio turno'):r.type==='asuntos'?'Asuntos propios':'Vacaciones';

  // Aplica un swap individual (1 par) — reutiliza la lógica anterior
  const applySwap=async(reqEmpId,tgtEmpId,reqDate,tgtDate)=>{
    const{data:s1}=await sb.from('shifts').select('shift_type,id').eq('employee_id',reqEmpId).eq('shift_date',reqDate).maybeSingle();
    const{data:s2}=await sb.from('shifts').select('shift_type,id').eq('employee_id',tgtEmpId).eq('shift_date',tgtDate).maybeSingle();
    // Validación: ambos deben tener turno de trabajo (M/T/N/D), nunca libre/vacaciones/asuntos
    if(!isWorkShift(s1?.shift_type))return`${reqDate}: el solicitante no tiene turno de trabajo asignado (${s1?.shift_type||'libre'})`;
    if(!isWorkShift(s2?.shift_type))return`${tgtDate}: el compañero no tiene turno de trabajo asignado (${s2?.shift_type||'libre'})`;
    if(s1.id)await sb.from('shifts').delete().eq('id',s1.id);
    if(s2.id)await sb.from('shifts').delete().eq('id',s2.id);
    await sb.from('shifts').upsert({employee_id:reqEmpId,shift_date:tgtDate,shift_type:s2.shift_type},{onConflict:'employee_id,shift_date'});
    await sb.from('shifts').upsert({employee_id:tgtEmpId,shift_date:reqDate,shift_type:s1.shift_type},{onConflict:'employee_id,shift_date'});
    return null;
  };

  const handleApprove=async()=>{
    setBusy(true);setErr('');
    try{
      if(r.type==='cambio'){
        // Validar y aplicar TODOS los pares antes de marcar como aprobado
        for(const p of r.pairs){
          const eMsg=await applySwap(r.requester_id,r.target_id,p.reqDate,p.tgtDate);
          if(eMsg){setErr(`No se pudo aplicar el par ${p.reqDate}↔${p.tgtDate}: ${eMsg}`);setBusy(false);return;}
        }
        // Invalidar cache de meses afectados
        const months=new Set();
        r.pairs.forEach(p=>{months.add(p.reqDate?.substring(0,7));months.add(p.tgtDate?.substring(0,7));});
        months.forEach(mk=>{if(mk)delete shiftsCache[mk];});
        window.__calendarVersion=(window.__calendarVersion||0)+1;
        // Marcar todas las filas del grupo como approved atómicamente
        if(r.groupId){
          const{data,error}=await sb.rpc('resolve_swap_group',{p_group_id:r.groupId,p_new_status:'approved',p_resolver_id:currentUserId});
          if(error||data?.[0]?.error){setErr(`Error al actualizar estado: ${error?.message||data?.[0]?.error}`);setBusy(false);return;}
        }else{
          // Solicitud antigua sin group_id
          for(const id of r.ids){
            await sb.from('shift_requests').update({status:'approved',approved_by:currentUserId,resolved_at:new Date().toISOString()}).eq('id',id);
          }
        }
        await logAudit('request_approved',{type:'swap',count:r.pairs.length,requester_id:r.requester_id,target_id:r.target_id},currentUserId);
      }else if(r.type==='vacaciones'&&r.requester_id&&r.vacation_start&&r.vacation_end){
        const days=[];let cur=r.vacation_start;
        while(cur<=r.vacation_end){days.push(cur);const dd=new Date(cur+'T12:00:00');dd.setDate(dd.getDate()+1);cur=dd.toISOString().split('T')[0];}
        for(const day of days){await sb.from('shifts').upsert({employee_id:r.requester_id,shift_date:day,shift_type:'V'},{onConflict:'employee_id,shift_date'});}
        const{data:bal}=await sb.from('vacation_balance').select('days_used,days_total').eq('employee_id',r.requester_id).eq('year',2026).single();
        if(bal)await sb.from('vacation_balance').update({days_used:bal.days_used+days.length}).eq('employee_id',r.requester_id).eq('year',2026);
        [...new Set(days.map(d=>d.substring(0,7)))].forEach(mk=>{delete shiftsCache[mk];});
        window.__calendarVersion=(window.__calendarVersion||0)+1;
        await sb.from('shift_requests').update({status:'approved',approved_by:currentUserId,resolved_at:new Date().toISOString()}).eq('id',r.id);
        await logAudit('request_approved',{type:'vacation',days:days.length,requester_id:r.requester_id},currentUserId);
      }else if(r.type==='asuntos'&&r.requester_id&&r.requester_date){
        await sb.from('shifts').upsert({employee_id:r.requester_id,shift_date:r.requester_date,shift_type:'P'},{onConflict:'employee_id,shift_date'});
        delete shiftsCache[r.requester_date.substring(0,7)];
        window.__calendarVersion=(window.__calendarVersion||0)+1;
        await sb.from('shift_requests').update({status:'approved',approved_by:currentUserId,resolved_at:new Date().toISOString()}).eq('id',r.id);
        await logAudit('request_approved',{type:'personal_day',requester_id:r.requester_id},currentUserId);
      }
      onResolved();
    }catch(ex){setErr('Error: '+(ex?.message||ex));setBusy(false);}
  };

  const handleReject=async()=>{
    if(!window.confirm(`¿Rechazar esta solicitud${r.isGroup?' completa ('+r.pairs.length+' días)':''}?`))return;
    setBusy(true);setErr('');
    try{
      if(r.type==='cambio'&&r.groupId){
        const{error}=await sb.rpc('resolve_swap_group',{p_group_id:r.groupId,p_new_status:'rejected',p_resolver_id:currentUserId});
        if(error){setErr('Error: '+error.message);setBusy(false);return;}
      }else{
        for(const id of r.ids){
          await sb.from('shift_requests').update({status:'rejected',approved_by:currentUserId,resolved_at:new Date().toISOString()}).eq('id',id);
        }
      }
      await logAudit('request_rejected',{type:r.type,count:r.ids.length},currentUserId);
      onResolved();
    }catch(ex){setErr('Error: '+(ex?.message||ex));setBusy(false);}
  };

  return(
    <div className="req-item">
      <div className="req-av">{r.av}</div>
      <div className="req-info">
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
          <span className="req-name">{r.name}</span>
          <span className="tag" style={{background:tagColor.bg,color:tagColor.fg,borderColor:'transparent'}}>{tagLabel}</span>
          {r.isGroup&&<button onClick={()=>setExpanded(v=>!v)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:11,padding:0}}>{expanded?'▲ ocultar':'▼ ver días'}</button>}
          <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{r.date}</span>
        </div>
        <div className="req-desc">{r.desc}</div>
        {r.isGroup&&expanded&&(
          <div style={{marginTop:8,background:'var(--bg3)',borderRadius:4,padding:'8px 10px',fontSize:11,lineHeight:1.7}}>
            {r.pairs.map((p,i)=>(
              <div key={p.id} style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{color:'var(--text3)',minWidth:20}}>{i+1}.</span>
                <span style={{minWidth:90}}>{p.reqDate?new Date(p.reqDate+'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'}):'?'}</span>
                <span style={{padding:'1px 6px',borderRadius:3,background:SHIFT_COLOR[p.reqShift]||'var(--bg2)',color:p.reqShift?'#fff':'var(--text3)',fontSize:10,fontWeight:600,minWidth:20,textAlign:'center'}}>{p.reqShift||'—'}</span>
                <span style={{color:'var(--text3)'}}>↔</span>
                <span style={{minWidth:90}}>{p.tgtDate?new Date(p.tgtDate+'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'}):'?'}</span>
                <span style={{padding:'1px 6px',borderRadius:3,background:SHIFT_COLOR[p.tgtShift]||'var(--bg2)',color:p.tgtShift?'#fff':'var(--text3)',fontSize:10,fontWeight:600,minWidth:20,textAlign:'center'}}>{p.tgtShift||'—'}</span>
              </div>
            ))}
          </div>
        )}
        {r.notes&&<div style={{fontSize:11,color:'var(--text3)',marginTop:3,fontStyle:'italic'}}>💬 {r.notes}</div>}
        {err&&<div style={{fontSize:11,color:'var(--red)',marginTop:4}}>⚠ {err}</div>}
      </div>
      <div className="req-actions">
        <button className="btn btn-ok btn-sm" disabled={busy} onClick={handleApprove}>{busy?'…':'✓ Aprobar'}</button>
        <button className="btn btn-danger btn-sm" disabled={busy} onClick={handleReject}>✗ Rechazar</button>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App(){
  // ── Auth state ────────────────────────────────────────────────────────────
  const [currentUser,setCurrentUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [page,setPage]=useState('today');
  const [adminOpen,setAdminOpen]=useState(true);

  // Verificar sesión Supabase Auth en cada arranque + escuchar cambios (token expirado / logout remoto)
  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){
        const {data:emp}=await sb.from('employees').select('*')
          .eq('auth_id',session.user.id).eq('active',true).maybeSingle();
        if(emp){
          setCurrentUser(emp);
        }else{
          await sb.auth.signOut();
        }
      }
      setAuthChecked(true);
    });
    // Listener: si el token caduca o se cierra sesión en otra pestaña, limpiar estado
    const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'||(event==='TOKEN_REFRESHED'&&!session)){
        setCurrentUser(null);
        setPage('today');
      }
    });
    // Cargar festivos desde BD al arrancar — actualiza festDates module-level
    fetchFestivos();
    return()=>{subscription?.unsubscribe?.();};
  },[]);

  const isAdmin=currentUser&&(currentUser.role==='admin'||currentUser.role==='manager'||currentUser.role==='coordinator');
  const isOperator=currentUser&&(currentUser.role==='operator'||currentUser.role==='staff');

  // ── Pantalla de carga mientras verifica Auth ──────────────────────────────
  if(!authChecked) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',color:'var(--text3)',fontSize:14,flexDirection:'column',gap:12}}>
      <div style={{fontSize:28}}>📡</div><div>Verificando sesión…</div>
    </div>
  );

  // ── Si no hay sesión → pantalla de login ─────────────────────────────────
  if(!currentUser) return <LoginView onLogin={user=>{
    setCurrentUser(user);
    setPage(user.role==='admin'||user.role==='manager'?'today':'opdashboard');
  }}/>;

  const handleLogout=async()=>{
    await sb.auth.signOut();
    try{localStorage.removeItem('noc_user');}catch(e){}
    setCurrentUser(null);
    setPage('today');
  };

  const handleUserUpdate=(updated)=>{
    setCurrentUser(updated); // sesión en memoria — Supabase Auth gestiona la persistencia
  };

  // ── Routing pages ──────────────────────────────────────────────────────────
  const P={
    today:TodayView,
    calendar:()=><CalendarView isAdmin={isAdmin}/>,
    team:TeamView,
    requests:RequestsView,
    admin:()=><AdminView currentUser={currentUser}/>,
    caln2:CalN2View,
    rrhh:ResumenRRHH,
    opdashboard:()=><OperatorDashboard user={currentUser}/>,
    profile:()=><ProfileView user={currentUser} onUserUpdate={handleUserUpdate}/>,
  };
  const Pg=P[page]||TodayView;
  const titles={today:'Vista del día',calendar:'Calendario',team:'Equipo',requests:'Solicitudes',admin:'Administración',caln2:'Calendario N2',rrhh:'Resumen RRHH',opdashboard:'Mi Panel',profile:'Mi Perfil'};
  const adminPages=['admin','caln2','rrhh'];
  const initials=(currentUser.full_name||currentUser.short_name||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo"><h1>NOC Turnos</h1><span>Avatel Telecom · 2026</span></div>
        <div className="nav">
          {isOperator?(
            <>
              <div className="nav-section">Mi espacio</div>
              {[{k:'opdashboard',n:'today',l:'Mi Panel'},{k:'today',n:'today',l:'Hoy'},{k:'calendar',n:'calendar',l:'Calendario'}].map(({k,n,l})=>(
                <div key={k} className={`nav-item ${page===k?'active':''}`} onClick={()=>setPage(k)}>
                  <NI n={n}/>{l}
                </div>
              ))}
            </>
          ):(
            <>
              <div className="nav-section">Principal</div>
              {[{k:'today',n:'today',l:'Hoy'},{k:'calendar',n:'calendar',l:'Calendario'},{k:'team',n:'team',l:'Equipo'}].map(({k,n,l})=>(
                <div key={k} className={`nav-item ${page===k?'active':''}`} onClick={()=>setPage(k)}>
                  <NI n={n}/>{l}
                </div>
              ))}
              <div className="nav-section">Gestión</div>
              <div className={`nav-item ${adminPages.includes(page)?'active':''}`} style={{justifyContent:'space-between'}}
                onClick={()=>{setAdminOpen(o=>!o);if(!adminPages.includes(page))setPage('admin');}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}><NI n="admin"/>Administración</div>
                <span style={{fontSize:9,transition:'transform .2s',display:'inline-block',transform:adminOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
              </div>
              {adminOpen&&(
                <div style={{paddingLeft:12}}>
                  {[{k:'admin',l:'Panel admin'},{k:'caln2',l:'Calendario N2'},{k:'rrhh',l:'Resumen RRHH'}].map(({k,l})=>(
                    <div key={k} className={`nav-item ${page===k?'active':''}`} style={{fontSize:12,padding:'7px 10px'}} onClick={()=>setPage(k)}>

        <div className="topbar">
          <span className="topbar-title">{titles[page]||'NOC Turnos'}</span>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:12,color:'var(--text3)'}}>{new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--blue2)',border:'1px solid var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--blue)',cursor:'pointer',overflow:'hidden'}}
              onClick={()=>setPage('profile')}>
              {currentUser.photo_url
                ?<img src={currentUser.photo_url} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}} alt="" onError={e=>{e.target.style.display='none';}}/>
                :initials
              }
            </div>
          </div>
        </div>
        <div className="content"><Pg/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
