<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2435;--bg4:#252d42;
  --border:#2a3350;--border2:#3a4566;
  --text:#e8eaf2;--text2:#8892b0;--text3:#4a5578;
  --blue:#4f8ef7;--blue2:#1e3a6e;--blue3:#0d1f3c;
  --teal:#00d9b8;--amber:#f7b84f;--amber2:#7a5520;
  --red:#f75f5f;--red2:#5c1f1f;
  --green:#4fc97a;--green2:#1a4d2e;
  --orange:#fb923c;--orange2:#7c3612;--orange3:#3d1a08;
  --weekend-bg:rgba(79,142,247,0.07);
  --weekend-border:rgba(79,142,247,0.3);
  --festivo-bg:rgba(247,184,79,0.13);
  --festivo-border:rgba(247,184,79,0.55);
  --radius:10px;--radius-sm:6px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:var(--font);font-size:14px;color:var(--text)}
input,select,textarea{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:16px;font-weight:600;letter-spacing:.5px}
.sidebar-logo span{font-size:11px;color:var(--text3);font-family:var(--mono)}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;transition:all .15s;font-size:13px;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:12px 12px 6px}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;background:var(--bg2)}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:600;letter-spacing:-.5px}

/* Badges — D now orange */
.badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;border-radius:4px;min-width:22px;height:22px;padding:0 4px}
.badge-M{background:#1a3a6e;color:#7eb8f7}
.badge-T{background:#3d2a1a;color:#f7b84f}
.badge-N{background:#2a1a4a;color:#c084fc}
.badge-V{background:#1a3d2a;color:#4fc97a}
.badge-B{background:#3d1a1a;color:#f75f5f}
.badge-D{background:var(--orange3);color:var(--orange)}
.badge-O{background:#2d2a1a;color:#fbbf24}
.badge-empty{background:transparent;color:var(--text3)}
/* Calendar */
.cal-wrapper{overflow-x:auto}
.cal-table{width:100%;border-collapse:separate;border-spacing:0}
.cal-table th{position:sticky;top:0;z-index:2;background:var(--bg3);color:var(--text3);font-size:10px;font-weight:500;padding:6px 3px;text-align:center;border-bottom:1px solid var(--border);min-width:32px}
.cal-table th.name-col{text-align:left;left:0;z-index:3;min-width:150px;padding-left:10px}
.cal-table td{padding:3px 2px;text-align:center;border-bottom:1px solid rgba(42,51,80,.3)}
.cal-table td.name-cell{text-align:left;position:sticky;left:0;background:var(--bg2);z-index:1;padding:3px 10px;white-space:nowrap;font-size:13px}
.cal-table tr:hover td,.cal-table tr:hover td.name-cell{background:var(--bg3)}
.th-weekend{background:#182240!important;color:#7eb8f7!important;border-bottom:2px solid rgba(79,142,247,.4)!important}
.td-weekend{background:var(--weekend-bg)!important}
.th-festivo{background:#2a1c06!important;color:var(--amber)!important;border-bottom:2px solid var(--festivo-border)!important}
.td-festivo{background:var(--festivo-bg)!important;border-left:1px solid rgba(247,184,79,.2)!important;border-right:1px solid rgba(247,184,79,.2)!important}
.th-today{background:var(--blue3)!important;color:var(--blue)!important;border-bottom:2px solid var(--blue)!important}
.td-today{background:rgba(79,142,247,.1)!important;border-left:1px solid rgba(79,142,247,.3)!important}
/* Multi-select cell highlight */
.td-selected{outline:2px solid var(--blue)!important;outline-offset:-1px;background:rgba(79,142,247,.18)!important;cursor:pointer}
.cell-edit{cursor:pointer}
.cell-edit:hover .badge{outline:2px solid var(--blue)}
/* Coverage bars */
.cov-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.cov-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0}
.cov-bar{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.cov-fill{height:100%;border-radius:4px}
.cov-ok{background:var(--teal)}.cov-warn{background:var(--amber)}.cov-bad{background:var(--red)}
.cov-count{font-size:11px;font-family:var(--mono);color:var(--text2);width:40px;text-align:right}
/* Requests */
.req-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.req-av{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
.req-info{flex:1;min-width:0}
.req-name{font-size:13px;font-weight:500}
.req-desc{font-size:11px;color:var(--text2);margin-top:2px}
.req-actions{display:flex;gap:6px;flex-shrink:0}
/* Buttons */
.btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#3d7fe8}
.btn-ghost{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-ok{background:var(--green2);color:var(--green);border-color:var(--green2)}
.btn-ok:hover{background:#1f5c36}
.btn-danger{background:var(--red2);color:var(--red);border-color:var(--red2)}
.btn-danger:hover{background:#6b2222}
.btn-warn{background:var(--amber2);color:var(--amber);border-color:var(--amber2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{width:28px;height:28px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
/* Tables */
.emp-table{width:100%;border-collapse:collapse}
.emp-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;border-bottom:1px solid var(--border)}
.emp-table td{padding:10px;border-bottom:1px solid rgba(42,51,80,.4);font-size:13px}
.emp-table tr:last-child td{border-bottom:none}
.emp-table tr:hover td{background:var(--bg3)}
.hbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;width:90px;display:inline-block;vertical-align:middle;margin-right:6px}
.hfill{height:100%;border-radius:3px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.pill-ok{background:var(--green2);color:var(--green)}
.pill-warn{background:var(--amber2);color:var(--amber)}
.pill-bad{background:var(--red2);color:var(--red)}
.pill-blue{background:var(--blue3);color:var(--blue)}
.pill-purple{background:#2a1a4a;color:#c084fc}
.pill-neutral{background:var(--bg4);color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.fg{margin-bottom:14px}.fl{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue)}
.fs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Misc */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.notif{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;background:var(--red);color:#fff;border-radius:8px;font-size:10px;font-weight:600;padding:0 4px}
.today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.shift-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.sbt{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sb-M .sbt{color:#7eb8f7}.sb-T .sbt{color:#f7b84f}.sb-N .sbt{color:#c084fc}
.sp{font-size:13px;padding:5px 0;border-bottom:1px solid rgba(42,51,80,.4)}
.sp:last-child{border-bottom:none}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px}
.alert-warn{background:rgba(247,184,79,.1);border:1px solid rgba(247,184,79,.3);color:var(--amber)}
.alert-info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--blue)}
.alert-ok{background:rgba(79,201,122,.1);border:1px solid rgba(79,201,122,.3);color:var(--green)}
.month-nav{display:flex;align-items:center;gap:12px}
.mnb{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px}
.mnb:hover{background:var(--bg4);color:var(--text)}
.mt{font-size:14px;font-weight:500;min-width:130px;text-align:center}
/* Coverage rule editor */
.rule-row{display:grid;grid-template-columns:1fr 100px 80px 80px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,51,80,.35)}
.rule-row:last-child{border-bottom:none}
.rule-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;color:var(--text);font-size:12px;width:100%;outline:none}
.rule-input:focus{border-color:var(--blue)}
.rule-num{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;color:var(--text);font-size:12px;width:100%;outline:none;text-align:center;font-family:var(--mono)}
.rule-num:focus{border-color:var(--blue)}
/* Multi-select banner */
.sel-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--blue3);border:1px solid var(--blue2);border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

// ── SUPABASE CLIENT ───────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://naywdwsjwtbagbzrncke.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5heXdkd3Nqd3RiYWdienJuY2tlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTM4MTAsImV4cCI6MjA4OTc2OTgxMH0.hoLOn9py6G99Bivp_NQgmL8g7H3XnuAryz6RkQ3UE6g';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── DB HELPERS ────────────────────────────────────────────────────────────────
// Cache to avoid re-fetching same month
const shiftsCache = {};

async function fetchShiftsForMonth(monthIdx) {
  const key = `2026-${String(monthIdx+1).padStart(2,'0')}`;
  if (shiftsCache[key]) return shiftsCache[key];
  const start = `${key}-01`;
  const end = `${key}-31`;
  const { data, error } = await sb
    .from('shifts')
    .select('shift_date, shift_type, employee:employee_id(short_name)')
    .gte('shift_date', start)
    .lte('shift_date', end);
  if (error) { console.error('fetchShifts error', error); return {}; }
  // Convert to {shortName: [s1,s2,...,s31]}
  const result = {};
  if (data) {
    data.forEach(row => {
      const sn = row.employee?.short_name;
      if (!sn) return;
      const day = new Date(row.shift_date + 'T00:00:00').getDate() - 1;
      if (!result[sn]) result[sn] = Array(31).fill('');
      result[sn][day] = row.shift_type;
    });
  }
  shiftsCache[key] = result;
  return result;
}

async function saveShift(employeeShortName, date, shiftType) {
  // Get employee id - try short_name first, then full_name
  let { data: emp } = await sb.from('employees').select('id').eq('short_name', employeeShortName).maybeSingle();
  if (!emp) {
    const { data: emp2 } = await sb.from('employees').select('id').eq('full_name', employeeShortName).maybeSingle();
    emp = emp2;
  }
  if (!emp) { console.error('saveShift: empleado no encontrado:', employeeShortName); return { error: 'Empleado no encontrado' }; }
  const { error } = await sb.from('shifts').upsert(
    { employee_id: emp.id, shift_date: date, shift_type: shiftType },
    { onConflict: 'employee_id,shift_date' }
  );
  // Invalidate cache
  const mk = date.substring(0,7);
  delete shiftsCache[mk];
  return { error };
}

async function fetchCoverageRules() {
  const { data } = await sb.from('coverage_rules').select('*').order('sort_order');
  return data || [];
}

async function saveCoverageRule(rule) {
  const { error } = await sb.from('coverage_rules').upsert(rule);
  return error;
}

async function deleteRule(id) {
  const { error } = await sb.from('coverage_rules').delete().eq('id', id);
  return error;
}

async function insertRule(rule) {
  const { error } = await sb.from('coverage_rules').insert(rule);
  return error;
}

async function fetchN2Assignments() {
  const { data } = await sb.from('n2_assignments')
    .select('week_number, has_festivo, importe_base, importe_festivo, employee:employee_id(short_name, full_name)')
    .eq('year', 2026)
    .order('week_number');
  return data || [];
}

async function saveN2Assignment(weekNumber, employeeShortName) {
  let { data: emp } = await sb.from('employees').select('id').eq('short_name', employeeShortName).maybeSingle();
  if (!emp) {
    const { data: emp2 } = await sb.from('employees').select('id').eq('full_name', employeeShortName).maybeSingle();
    emp = emp2;
  }
  if (!emp) return;
  await sb.from('n2_assignments').update({ employee_id: emp.id }).eq('week_number', weekNumber).eq('year', 2026);
}

// ── DEV DIAGNOSTICS ──────────────────────────────────────────────────────────
async function runDiagnostics() {
  const results = {};
  try {
    const { data: emps, error: e1 } = await sb.from('employees').select('count').single();
    results.employees = e1 ? `ERROR: ${e1.message}` : `OK (${emps?.count||'?'} rows)`;
  } catch(e){ results.employees = `EXCEPTION: ${e.message}`; }
  try {
    const { data: sh, error: e2 } = await sb.from('shifts').select('count').single();
    results.shifts = e2 ? `ERROR: ${e2.message}` : `OK (${sh?.count||'?'} rows)`;
  } catch(e){ results.shifts = `EXCEPTION: ${e.message}`; }
  try {
    const { data: n2, error: e3 } = await sb.from('n2_assignments').select('count').single();
    results.n2 = e3 ? `ERROR: ${e3.message}` : `OK (${n2?.count||'?'} rows)`;
  } catch(e){ results.n2 = `EXCEPTION: ${e.message}`; }
  try {
    const { data: cr, error: e4 } = await sb.from('coverage_rules').select('count').single();
    results.coverage_rules = e4 ? `ERROR: ${e4.message}` : `OK (${cr?.count||'?'} rows)`;
  } catch(e){ results.coverage_rules = `EXCEPTION: ${e.message}`; }
  try {
    // Test write on shifts (upsert with fake data then verify)
    const testDate = '2099-01-01';
    const { data: anyEmp } = await sb.from('employees').select('id').limit(1).single();
    if (anyEmp) {
      const { error: ew } = await sb.from('shifts').upsert(
        { employee_id: anyEmp.id, shift_date: testDate, shift_type: 'M' },
        { onConflict: 'employee_id,shift_date' }
      );
      if (!ew) {
        await sb.from('shifts').delete().eq('shift_date', testDate);
        results.write_test = 'OK (escritura confirmada)';
      } else {
        results.write_test = `ERROR escritura: ${ew.message}`;
      }
    } else {
      results.write_test = 'WARN: no hay empleados';
    }
  } catch(e){ results.write_test = `EXCEPTION: ${e.message}`; }
  return results;
}

async function fetchEmployees() {
  const { data } = await sb.from('employees').select('*').order('role').order('full_name');
  return data || [];
}

async function createShiftRequest(req) {
  const { error } = await sb.from('shift_requests').insert(req);
  return error;
}

async function fetchPendingRequests() {
  const { data } = await sb.from('shift_requests')
    .select('id, request_type, status, created_at, requester_date, target_date, vacation_start, vacation_end, requester:requester_id(id, full_name, short_name), target:target_id(id, full_name, short_name)')
    .eq('status', 'pending')
    .order('created_at', { ascending: false });
  return data || [];
}

async function updateRequestStatus(id, status, approverId) {
  const { error } = await sb.from('shift_requests').update({ status, approved_by: approverId, updated_at: new Date().toISOString() }).eq('id', id);
  return error;

// ── TODAY ──────────────────────────────────────────────────────────────────────
function TodayView(){
  const t=new Date(),mi=t.getMonth(),d=t.getDate();
  const [md,setMd]=useState({});
  const [loading,setLoading]=useState(true);
  useEffect(()=>{fetchShiftsForMonth(mi).then(data=>{setMd(data);setLoading(false);});},[mi]);
  const w={M:[],T:[],N:[]};
  EMPS.forEach(e=>{const ek=EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];if(s==='M')w.M.push(e);if(s==='T')w.T.push(e);if(s==='N')w.N.push(e);});
  const fest=isFest(mi,d),we=isWE(mi,d),mr=we?MWE:MWK;
  const ok=w.M.length>=mr.M&&w.T.length>=mr.T&&w.N.length>=mr.N;
  const absent=EMPS.filter(e=>{const ek=EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];return s==='B'||s==='V';});
  if(loading) return <div style={{padding:40,color:'var(--text3)',textAlign:'center'}}>⏳ Cargando datos...</div>;
  return(
    <div>
      <div style={{marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
        <div>
          <div style={{fontSize:22,fontWeight:600}}>{t.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
            {fest?<span style={{color:'var(--amber)'}}>⚡ Festivo Madrid — Bonificación activa</span>
            :we?<span style={{color:'var(--blue)'}}>Fin de semana — Cobertura mínima: 2M/2T/2N</span>
            :'Día laborable — Cobertura mínima: 4M/4T/2N'}
          </div>
        </div>
        <span className={`pill ${ok?'pill-ok':'pill-bad'}`} style={{marginLeft:'auto'}}>{ok?'✓ Cobertura correcta':'⚠ Cobertura insuficiente'}</span>
      </div>
      <div className="today-grid">
        {[{k:'M',l:'Mañana',ti:'07:00–15:00',ws:w.M,mn:mr.M,c:'sb-M'},{k:'T',l:'Tarde',ti:'15:00–23:00',ws:w.T,mn:mr.T,c:'sb-T'},{k:'N',l:'Noche',ti:'23:00–07:00',ws:w.N,mn:mr.N,c:'sb-N'}].map(({k,l,ti,ws,mn,c})=>(
          <div key={k} className={`shift-block ${c}`}>
            <div className="sbt"><Bdg s={k}/>{l}<span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{ti}</span></div>
            {ws.length===0?<div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>Sin operadores</div>:ws.map(w=><div key={w} className="sp">{w}</div>)}
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)'}}>
              <span>{ws.length} operadores</span><span style={{color:ws.length>=mn?'var(--green)':'var(--red)'}}>Mín: {mn}</span>
            </div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Cobertura del turno</span></div>
          {[['M',w.M.length,mr.M],['T',w.T.length,mr.T],['N',w.N.length,mr.N]].map(([l,v,m])=>{
            const c=v>=m?'cov-ok':v>=m-1?'cov-warn':'cov-bad';
            return(<div key={l} className="cov-row"><span className="cov-label"><Bdg s={l}/></span><div className="cov-bar"><div className={`cov-fill ${c}`} style={{width:`${Math.min(v/8*100,100)}%`}}/></div><span className="cov-count">{v}/{m}+</span></div>);
          })}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Ausencias hoy</span></div>
          {absent.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>Sin ausencias registradas</div>
          :absent.map(e=>{const ek=EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];return(
            <div key={e} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(42,51,80,.3)'}}>
              <span>{e}</span><span className={`pill ${s==='B'?'pill-bad':'pill-warn'}`} style={{marginLeft:'auto'}}>{SL[s]||''}</span>
            </div>);})}
        </div>
      </div>
    </div>
  );
}

// ── CALENDAR ───────────────────────────────────────────────────────────────────
function CalendarView({isAdmin=true}){
  const today=new Date();
  const [mi,setMi]=useState(today.getMonth());
  const [shifts,setShifts]=useState(SD);
  // Multi-select state: {emp, days: Set of day indices}
  const [sel,setSel]=useState(null); // {emp, days: Set}
  const [batchModal,setBatchModal]=useState(false);
  const [batchShift,setBatchShift]=useState('M');

  const [dbShifts,setDbShifts]=useState({});
  const [calLoading,setCalLoading]=useState(false);
  useEffect(()=>{
    setCalLoading(true);
    fetchShiftsForMonth(mi).then(data=>{setDbShifts(data);setCalLoading(false);});
  },[mi]);
  const mk=MONTHS[mi],days=MD[mi];
  // Merge: dbShifts override static SD for loaded months
  const md = {...(SD[mk]||{}),...dbShifts};
  const di=useMemo(()=>Array.from({length:days},(_,i)=>({we:isWE(mi,i+1),fe:isFest(mi,i+1),to:isTod(mi,i+1),dow:new Date(2026,mi,i+1).getDay()})),[mi,days]);
  const cov=useMemo(()=>Array.from({length:days},(_,i)=>{let m=0,t=0,n=0;EMPS.forEach(e=>{const s=(md[e]||[])[i];if(s==='M')m++;if(s==='T')t++;if(s==='N')n++;});return{m,t,n};}),[mi,md,days]);

  const thcls=info=>{if(info.fe)return 'th-festivo';if(info.to)return 'th-today';if(info.we)return 'th-weekend';return '';};
  const tdcls=info=>{if(info.fe)return 'td-festivo';if(info.to)return 'td-today';if(info.we)return 'td-weekend';return '';};

  const handleCellClick=(emp,dayIdx)=>{
    if(!isAdmin)return;
    setSel(prev=>{
      if(!prev||prev.emp!==emp){
        // Start new selection for this employee
        return{emp,days:new Set([dayIdx])};
      }
      // Toggle day in existing selection for same employee
      const nd=new Set(prev.days);
      if(nd.has(dayIdx))nd.delete(dayIdx);else nd.add(dayIdx);
      return nd.size===0?null:{emp,days:nd};
    });
  };

  const applyBatch=async()=>{
    if(!sel)return;
    // Save each changed day to DB
    const empKey=EMP_SHORT[sel.emp]||sel.emp;
    const savePromises=[...sel.days].map(dayIdx=>{
      const date=`2026-${String(mi+1).padStart(2,'0')}-${String(dayIdx+1).padStart(2,'0')}`;
      return saveShift(empKey, date, batchShift);
    });
    await Promise.all(savePromises);
    // Refresh month data
    const updated=await fetchShiftsForMonth(mi);
    setDbShifts(updated);
    setSel(null);setBatchModal(false);
  };

  const clearSel=()=>setSel(null);

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16,flexWrap:'wrap'}}>
        <div className="month-nav">
          <button className="mnb" onClick={()=>{setMi(i=>(i+11)%12);setSel(null);}}>‹</button>
          <span className="mt">{MN[mi]} 2026</span>
          <button className="mnb" onClick={()=>{setMi(i=>(i+1)%12);setSel(null);}}>›</button>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginLeft:'auto',alignItems:'center'}}>
          {Object.entries(SL).map(([k,v])=><span key={k} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text2)'}}><Bdg s={k}/> {v}</span>)}
          <span style={{fontSize:11,padding:'2px 8px',background:'var(--festivo-bg)',border:'1px solid var(--festivo-border)',borderRadius:4,color:'var(--amber)'}}>⚡ Festivo</span>
          <span style={{fontSize:11,padding:'2px 8px',background:'var(--weekend-bg)',border:'1px solid var(--weekend-border)',borderRadius:4,color:'#7eb8f7'}}>◻ Finde</span>
        </div>
      </div>

      {calLoading&&<div className="alert alert-info" style={{marginBottom:12}}><span>⏳</span><span>Cargando turnos desde la base de datos...</span></div>}
      {isAdmin&&!sel&&!calLoading&&(
        <div className="alert alert-info" style={{marginBottom:12}}>
          <span>✏️</span>
          <span>Modo admin — haz clic en celdas de un mismo operador para seleccionarlas. Selecciona varios días y aplica el turno de una vez.</span>
        </div>
      )}

      {isAdmin&&sel&&(
        <div className="sel-banner">
          <span style={{color:'var(--blue)'}}>✓</span>
          <span><strong>{sel.emp}</strong> — {sel.days.size} día{sel.days.size!==1?'s':''} seleccionado{sel.days.size!==1?'s':''}</span>
          <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
            <button className="btn btn-ghost btn-sm" onClick={clearSel}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setBatchModal(true)}>Asignar turno →</button>
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="cal-wrapper">
          <table className="cal-table">
            <thead>
              <tr>
                <th className="name-col">Operador</th>
                {di.map((info,i)=>(
                  <th key={i} className={thcls(info)}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                      {info.fe&&<span style={{fontSize:8}}>⚡</span>}
                      <span style={{fontSize:10}}>{i+1}</span>
                      <span style={{fontSize:9,opacity:.7}}>{DN[info.dow]}</span>
                    </div>
                  </th>
                ))}
              </tr>
              <tr style={{background:'var(--bg4)'}}>
                <td className="name-cell" style={{fontSize:10,color:'var(--text3)',padding:'2px 10px'}}>Cobertura</td>
                {cov.map(({m,t,n},i)=>{
                  const info=di[i],mr=info.we?MWE:MWK,all=m>=mr.M&&t>=mr.T&&n>=mr.N;
                  return(<td key={i} className={tdcls(info)} style={{padding:'2px 1px'}}>
                    <div style={{width:22,height:22,borderRadius:3,background:all?'rgba(79,201,122,.2)':'rgba(247,95,95,.2)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}>
                      <span style={{fontSize:9,color:all?'var(--green)':'var(--red)',fontWeight:700}}>{all?'✓':'!'}</span>
                    </div>
                  </td>);
                })}
              </tr>
            </thead>
            <tbody>
              {EMPS.map(emp=>(
                <tr key={emp}>
                  <td className="name-cell">{emp}</td>
                  {di.map((info,i)=>{
                    const empKey=EMP_SHORT[emp]||emp;
                    const s=(md[empKey]||[])[i]||'';
                    const isSel=sel&&sel.emp===emp&&sel.days.has(i);
                    const isSelEmp=sel&&sel.emp===emp;
                    return(
                      <td key={i}
                        className={`${isSel?'td-selected':tdcls(info)} ${isAdmin?'cell-edit':''}`}
                        onClick={isAdmin?()=>handleCellClick(emp,i):undefined}
                        style={{opacity:sel&&!isSelEmp?.5:1,transition:'opacity .1s'}}>
                        <Bdg s={s}/>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {batchModal&&sel&&(
        <div className="modal-overlay" onClick={()=>setBatchModal(false)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Asignar turno en bloque</div>
            <div className="modal-sub">
              {sel.emp} — {sel.days.size} días seleccionados en {MN[mi]}
              <div style={{marginTop:6,fontSize:11,color:'var(--text3)'}}>
                Días: {[...sel.days].sort((a,b)=>a-b).map(d=>d+1).join(', ')}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:20}}>
              {['M','T','N','V','B','D','O',''].map(s=>(
                <button key={s||'x'} onClick={()=>setBatchShift(s)}
                  style={{padding:'10px 4px',borderRadius:6,border:'2px solid',cursor:'pointer',
                    borderColor:batchShift===s?'var(--blue)':'var(--border)',
                    background:batchShift===s?'var(--blue3)':'var(--bg3)',
                    display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <Bdg s={s}/><span style={{fontSize:10,color:'var(--text2)'}}>{s?SL[s]:'Libre'}</span>
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setBatchModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={applyBatch}>
                Aplicar a {sel.days.size} día{sel.days.size!==1?'s':''}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TEAM ───────────────────────────────────────────────────────────────────────
function TeamView(){
  const today=new Date(),mi=today.getMonth(),d=today.getDate();
  const [md,setMd]=useState({});
  useEffect(()=>{fetchShiftsForMonth(mi).then(setMd);},[mi]);

  // Turno actual
  function getTurno(emp){
    const empKey=EMP_SHORT[emp]||emp;
    const s=(md[empKey]||[])[d-1]||'';
    if(s==='M') return{label:'Mañana',cls:'pill-blue'};
    if(s==='T') return{label:'Tarde',cls:'pill-purple'};
    if(s==='N') return{label:'Noche',cls:'pill-purple'};
    if(s==='D') return{label:'H. extras',cls:'pill-warn'};
    if(s==='O') return{label:'Onboarding',cls:'pill-neutral'};
    return{label:'Libre',cls:'pill-ok'};
  }
  // Situación laboral (prioridad sobre turno)
  function getSituacion(emp){
    const empKey=EMP_SHORT[emp]||emp;
    const s=(md[empKey]||[])[d-1]||'';
    if(s==='B') return{label:'Baja',cls:'pill-bad'};
    if(s==='V') return{label:'Vacaciones',cls:'pill-warn'};
    return null; // normal = no special situation
  }

  const ed=useMemo(()=>EMPS.map(emp=>{
    // REC uses short names, EMPS uses full names — map via EMP_SHORT
    const shortKey=EMP_SHORT[emp]||emp;
    const r=REC[shortKey]||{};const h=r.h||0;const j=(r.M||0)+(r.T||0)+(r.N||0);const eh=(r.D||0)*8;
    const hst=h>HMAX?'bad':h>HMAX*.92?'warn':'ok';
    return{emp,r,h,j,eh,hst};
  }),[]);

  // Build lists for the widget
  const bajas=EMPS.filter(e=>(md[EMP_SHORT[e]||e]||[])[d-1]==='B');
  const vacas=EMPS.filter(e=>(md[EMP_SHORT[e]||e]||[])[d-1]==='V');

  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 1fr',gap:12,marginBottom:20}}>
        {/* Operadores widget — now expanded with vacas+bajas */}
        <div className="stat" style={{gridRow:'span 1'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
            <div className="stat-label">Equipo</div>
          </div>
          <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:10}}>
            <span className="stat-val" style={{color:'var(--teal)'}}>{EMPS.length}</span>
            <span style={{fontSize:12,color:'var(--text3)'}}>operadores</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>Hoy ausentes</div>
            {bajas.length===0&&vacas.length===0&&(
              <span style={{fontSize:12,color:'var(--green)'}}>✓ Sin ausencias</span>
            )}
            {bajas.map(e=>(
              <div key={e} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                <span className="pill pill-bad" style={{fontSize:10,padding:'1px 6px'}}>Baja</span>
                <span style={{color:'var(--text2)'}}>{e}</span>
              </div>
            ))}
            {vacas.map(e=>(
              <div key={e} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                <span className="pill pill-warn" style={{fontSize:10,padding:'1px 6px'}}>Vacaciones</span>
                <span style={{color:'var(--text2)'}}>{e}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="stat"><div className="stat-label">Horas pactadas</div><div className="stat-val" style={{color:'var(--blue)'}}>1.624h</div><div className="stat-sub">203 jornadas · 23 días vacac.</div></div>
        <div className="stat"><div className="stat-label">Alertas horas</div><div className="stat-val" style={{color:'var(--amber)'}}>{ed.filter(e=>e.hst!=='ok').length}</div><div className="stat-sub">sobre el 92% de las pactadas</div></div>
      </div>
      <div className="card" style={{padding:0}}>
        <div style={{padding:'16px 16px 0',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <span className="card-title">Resumen anual</span>
          <span style={{fontSize:11,color:'var(--text3)'}}>Turno/Situación = hoy, {today.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}</span>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="emp-table">
            <thead><tr><th>Operador</th><th>Horas ({HMAX}h)</th><th>Jornadas ({JMAX})</th><th>M / T / N</th><th>Vacac. ({VMAX})</th><th>Bajas</th><th>H.extras</th><th>Turno hoy</th><th>Situación</th></tr></thead>
            <tbody>
              {ed.map(({emp,r,h,j,eh,hst})=>{
                const noData = h === 0 && j === 0;
                const bc=noData?'var(--text3)':hst==='ok'?'#4fc97a':hst==='warn'?'#f7b84f':'#f75f5f';
                const ec=eh>80?'var(--red)':eh>60?'var(--amber)':'var(--text2)';
                const turno=getTurno(emp);
                const situ=getSituacion(emp);
                return(<tr key={emp} style={{opacity:noData?.5:1}}>
                  <td style={{fontWeight:500}}>
                    {emp}
                    {noData&&<span style={{fontSize:10,color:'var(--text3)',marginLeft:6}}>sin datos</span>}
                  </td>
                  <td><div style={{display:'flex',alignItems:'center',gap:6}}><div className="hbar"><div className="hfill" style={{width:`${Math.min(h/HMAX*100,100)}%`,background:bc}}/></div><span style={{fontFamily:'var(--mono)',fontSize:12}}>{noData?'—':h+'h'}</span></div></td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:12}}>{j}</span></td>
                  <td>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:'#7eb8f7'}}>{r.M||0}</span>
                    <span style={{color:'var(--text3)',margin:'0 3px'}}>/</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:'#f7b84f'}}>{r.T||0}</span>
                    <span style={{color:'var(--text3)',margin:'0 3px'}}>/</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:'#c084fc'}}>{r.N||0}</span>
                  </td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:12,color:(r.V||0)>VMAX?'var(--red)':'var(--green)'}}>{r.V||0}</span></td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:12,color:r.B>0?'var(--red)':'var(--text2)'}}>{r.B||0}</span></td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:12,color:ec}}>{r.D||0} ({eh}h)</span></td>
                  <td>{situ?<span style={{opacity:.4,fontSize:11,color:'var(--text3)'}}>–</span>:<span className={`pill ${turno.cls}`}>{turno.label}</span>}</td>
                  <td>{situ?<span className={`pill ${situ.cls}`}>{situ.label}</span>:<span style={{fontSize:11,color:'var(--text3)'}}>–</span>}</td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

}

function getWeeks2026(){
  const weeks=[];
  const jan1=new Date(2026,0,1);
  const day=jan1.getDay();
  const offset=(day===0?1:day===1?0:8-day);
  let mon=new Date(2026,0,1+offset);
  let wn=1;
  while(mon.getFullYear()<=2026){
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    const endD=sun>new Date(2026,11,31)?new Date(2026,11,31):sun;
    weeks.push({wn,start:new Date(mon),end:new Date(endD)});
    mon=new Date(mon);mon.setDate(mon.getDate()+7);
    wn++;if(wn>53)break;
  }
  return weeks;
}
const WEEKS_2026=getWeeks2026();

function weekHasFestivo(week){
  for(let i=0;i<7;i++){
    const d=new Date(week.start);d.setDate(d.getDate()+i);
    if(d.getFullYear()!==2026)continue;
    const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(FEST.includes(s))return true;
  }
  return false;
}

  const mesNum=selMonth+1;

  const getApprover=(empName)=>{
    if(RESPONSABLES.find(r=>r.name===empName))return'Joaquín';
    return'Sergio Santos Ruiz';
  };

  const rows=useMemo(()=>{
    const result=[];
    const days=MD[selMonth];
    EMPS.forEach(emp=>{
      const empKey=EMP_SHORT[emp]||emp;
      let horasExtra=0,horasFestivos=0,plusNoc=0;
      const festDates=[],nDates=[];
      for(let i=0;i<days;i++){
        const shift=(md[empKey]||[])[i]||'';
        const d=new Date(2026,selMonth,i+1);
        const isFestD=isFest(selMonth,i+1)||d.getDay()===0;
        if(shift==='D'){if(isFestD)horasFestivos+=8;else horasExtra+=8;}
        if(shift==='N'){plusNoc++;horasFestivos+=8;nDates.push((i+1)+'/'+mesNum);}
        if((shift==='M'||shift==='T')&&isFestD){horasFestivos+=8;festDates.push((i+1)+'/'+mesNum);}
      }
      // N2 guardias for this person this month
      const myWeeks=WEEKS_2026.filter(w=>{
        if(n2Assigns[w.wn]!==emp)return false;
        return w.start.getMonth()===selMonth||w.end.getMonth()===selMonth;
      });
      const guardiaImp=myWeeks.length*GUARDIA_N2_IMPORTE;
      const guardiaFestImp=myWeeks.filter(w=>weekHasFestivo(w)).length*GUARDIA_N2_FESTIVO_IMPORTE;
      const approver=getApprover(emp);

      if(horasExtra>0)result.push({emp,approver,tipo:'Horas Extra',horasExtra,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc:0,fecha:festDates.slice(0,4).join(', ')||'',desc:'Horas extraordinarias'});
      if(horasFestivos>0)result.push({emp,approver,tipo:'Horas Festivos/Noche',horasExtra:0,horasFestivos,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc:0,fecha:[...nDates,...festDates].slice(0,4).join(', ')||'',desc:'Turno nocturno y/o festivo'});
      if(guardiaImp>0)result.push({emp,approver,tipo:'Guardia N2',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:guardiaImp,guardiasFE:0,comisiones:0,km:0,plusNoc:0,fecha:myWeeks.map(w=>'S'+w.wn).join(', '),desc:'Guardia N2 semanal'});
      if(guardiaFestImp>0)result.push({emp,approver,tipo:'Guardia N2 Festivo',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:guardiaFestImp,comisiones:0,km:0,plusNoc:0,fecha:myWeeks.filter(w=>weekHasFestivo(w)).map(w=>'S'+w.wn).join(', '),desc:'Guardia N2 festivo'});
      if(plusNoc>0)result.push({emp,approver,tipo:'Plus NOC',horasExtra:0,horasFestivos:0,horasExtraFM:0,horasFestFM:0,guardiasE:0,guardiasFE:0,comisiones:0,km:0,plusNoc,fecha:'',desc:'Plus nocturnidad — '+plusNoc+' noches'});
    });
    extraRows.filter(r=>r.month===selMonth).forEach(r=>result.push(r));
    return result;
  },[selMonth,n2Assigns,extraRows,md]);

  const COL=['MES','NOMBRE Y APELLIDOS','DNI','RESPONSABLE QUE VALIDA','Nº HORAS EXTRA','Nº HORAS FESTIVOS','Nº HORAS EXTRA - FM','Nº HORAS FESTIVOS - FM','GUARDIAS (€)','GUARDIAS FESTIVO (€)','COMISIONES (€)','KILOMETRAJE (KM)','PLUS NOC','FECHA Y HORA','DESCRIPCIÓN'];

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:2}}>Resumen RRHH</div>
          <div style={{fontSize:12,color:'var(--text3)'}}>Informe mensual incidencias nómina · NOC Central</div>
        </div>
        <div style={{display:'flex',gap:8,marginLeft:'auto',alignItems:'center'}}>
          <select className="fs" style={{width:'auto',fontSize:12,padding:'5px 10px'}} value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))}>
            {MN.map((m,i)=><option key={i} value={i}>{m} 2026</option>)}
          </select>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setShowAddRow(true)}>+ Entrada manual</button>
          <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>{
            // Build data array for SheetJS
            const headers=['MES','NOMBRE Y APELLIDOS','DNI','RESPONSABLE QUE VALIDA',
              'Nº HORAS EXTRA','Nº HORAS FESTIVOS','Nº HORAS EXTRA - FM','Nº HORAS FESTIVOS - FM',
              'GUARDIAS (€)','GUARDIAS FESTIVO (€)','COMISIONES (€)','KILOMETRAJE (KM)','PLUS NOC',
              'FECHA Y HORA','DESCRIPCIÓN DEL TRABAJO'];
            const dataRows=rows.map(r=>[
              mesNum, r.emp, '', r.approver,
              r.horasExtra||'', r.horasFestivos||'', r.horasExtraFM||'', r.horasFestFM||'',
              r.guardiasE||'', r.guardiasFE||'', r.comisiones||'', r.km||'',
              r.plusNoc||'', r.fecha||'', r.desc||''
            ]);
            const ws=XLSX.utils.aoa_to_sheet([headers,...dataRows]);
            // Column widths
            ws['!cols']=[{wch:5},{wch:30},{wch:12},{wch:25},{wch:14},{wch:16},{wch:18},{wch:20},{wch:14},{wch:18},{wch:14},{wch:16},{wch:10},{wch:22},{wch:40}];
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,`${MN[selMonth]}-2026`);
            XLSX.writeFile(wb,`RRHH_NOC_${MN[selMonth]}_2026.xlsx`);
          }}>↓ Exportar XLSX</button>
        </div>
      </div>
      <div className="grid-2" style={{marginBottom:16}}>
        <div className="alert alert-info" style={{marginBottom:0}}><span>📋</span><span>Tabla generada automáticamente. Revisa antes de exportar. Envío automático el día 3 del mes siguiente.</span></div>
        <div className="alert alert-warn" style={{marginBottom:0}}><span>⚡</span><span>Operadores → aprobador <strong>Sergio Santos Ruiz</strong>. Si empleado es Sergio o Alberto → aprobador <strong>Joaquín</strong>.</span></div>
      </div>
      {rows.length===0?(
        <div className="card" style={{textAlign:'center',padding:40,color:'var(--text3)'}}><div style={{fontSize:20,marginBottom:8}}>📄</div>Sin entradas para {MN[selMonth]} 2026</div>
      ):(
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{background:'var(--bg3)'}}>
                  {COL.map(h=>(
                    <th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap',fontSize:10}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>{
                  const rowAccent = r.tipo==='Plus NOC'?'rgba(192,132,252,.05)':
                                    r.tipo==='Guardia N2'||r.tipo==='Guardia N2 Festivo'?'rgba(251,146,60,.05)':
                                    i%2===0?'transparent':'rgba(255,255,255,.01)';
                  const rowBorder = r.tipo==='Plus NOC'?'1px solid rgba(192,132,252,.15)':
                                    r.tipo==='Guardia N2'||r.tipo==='Guardia N2 Festivo'?'1px solid rgba(251,146,60,.15)':
                                    '1px solid rgba(42,51,80,.3)';
                  return(
                  <tr key={i} style={{borderBottom:rowBorder,background:rowAccent}}>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)'}}>{mesNum}</td>
                    <td style={{padding:'8px 10px',fontWeight:500,whiteSpace:'nowrap'}}>
                      <div>{r.emp}</div>
                      {(r.tipo==='Plus NOC'||r.tipo==='Guardia N2'||r.tipo==='Guardia N2 Festivo')&&(
                        <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{r.tipo}</div>
                      )}
                    </td>
                    <td style={{padding:'8px 10px',color:'var(--text3)',fontSize:10}}>—</td>
                    <td style={{padding:'8px 10px',whiteSpace:'nowrap',fontSize:12}}>{r.approver}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:r.horasExtra>0?'var(--blue)':'var(--text3)'}}>{r.horasExtra||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:r.horasFestivos>0?'var(--amber)':'var(--text3)'}}>{r.horasFestivos||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:'var(--text3)'}}>{r.horasExtraFM||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:'var(--text3)'}}>{r.horasFestFM||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:r.guardiasE>0?'var(--orange)':'var(--text3)'}}>{r.guardiasE||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:r.guardiasFE>0?'var(--amber)':'var(--text3)'}}>{r.guardiasFE||'–'}</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:'var(--text3)'}}>–</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:'var(--text3)'}}>–</td>
                    <td style={{padding:'8px 10px',fontFamily:'var(--mono)',textAlign:'center',color:r.plusNoc>0?'#c084fc':'var(--text3)'}}>{r.plusNoc||'–'}</td>
                    <td style={{padding:'8px 10px',color:'var(--text2)',fontSize:10,whiteSpace:'nowrap'}}>{r.fecha||'–'}</td>
                    <td style={{padding:'8px 10px',color:'var(--text2)',maxWidth:160,fontSize:11}}>{r.desc}</td>

                  </tr>
                );})}
              </tbody>
            </table>
          </div>
          <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text3)',display:'flex',justifyContent:'space-between'}}>
            <span>{rows.length} filas · {MN[selMonth]} 2026</span>
          </div>
        </div>
      )}
      {showAddRow&&(
        <div className="modal-overlay" onClick={()=>setShowAddRow(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Entrada manual</div>
            <div className="modal-sub">Para km, comisiones, fuerza mayor u otros conceptos no automáticos</div>
            <div className="fg"><label className="fl">Operador</label>
              <select className="fs" value={newRow.emp} onChange={e=>setNewRow(p=>({...p,emp:e.target.value}))}>
                <option value="">Seleccionar…</option>
                {[...EMPS,...N2_MEMBERS].filter((v,i,a)=>a.indexOf(v)===i).map(e=><option key={e}>{e}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">Tipo de incidencia</label>
              <select className="fs" value={newRow.tipo} onChange={e=>setNewRow(p=>({...p,tipo:e.target.value}))}>
                <option value="horas_extra">Horas extra (L-V 7-22)</option>
                <option value="horas_festivo">Horas festivo/nocturno</option>
                <option value="horas_fm">Horas fuerza mayor</option>
                <option value="guardia">Guardia (€)</option>
                <option value="km">Kilometraje (km)</option>
                <option value="comision">Comisión (€)</option>
              </select>
            </div>
            <div className="frow">
              <div className="fg"><label className="fl">Horas / Importe / KM</label><input className="fi" type="number" value={newRow.horas} onChange={e=>setNewRow(p=>({...p,horas:e.target.value}))} placeholder="0"/></div>
              <div className="fg"><label className="fl">Fecha y hora</label><input className="fi" value={newRow.fecha} onChange={e=>setNewRow(p=>({...p,fecha:e.target.value}))} placeholder="3/3 18:00 a 20:00"/></div>
            </div>
            <div className="fg"><label className="fl">Descripción</label><input className="fi" value={newRow.desc} onChange={e=>setNewRow(p=>({...p,desc:e.target.value}))} placeholder="Motivo…"/></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <button className="btn btn-ghost" onClick={()=>setShowAddRow(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={()=>{
                if(!newRow.emp)return;
                const h=Number(newRow.horas)||0;
                const row={emp:newRow.emp,approver:getApprover(newRow.emp),tipo:newRow.tipo,
                  horasExtra:newRow.tipo==='horas_extra'?h:0,horasFestivos:newRow.tipo==='horas_festivo'?h:0,
                  horasExtraFM:newRow.tipo==='horas_fm'?h:0,horasFestFM:0,
                  guardiasE:newRow.tipo==='guardia'?h:0,guardiasFE:0,
                  comisiones:newRow.tipo==='comision'?h:0,km:newRow.tipo==='km'?h:0,
                  plusNoc:0,fecha:newRow.fecha,desc:newRow.desc,month:selMonth};
                setExtraRows(p=>[...p,row]);
                setNewRow({emp:'',tipo:'horas_extra',horas:'',fecha:'',desc:''});
                setShowAddRow(false);
              }}>Añadir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('today');
  const [adminOpen,setAdminOpen]=useState(true);
  const P={today:TodayView,calendar:()=><CalendarView isAdmin={true}/>,team:TeamView,requests:RequestsView,admin:AdminView,caln2:CalN2View,rrhh:ResumenRRHH};
  const Pg=P[page]||TodayView;
  const titles={today:'Vista del día',calendar:'Calendario anual',team:'Equipo',requests:'Solicitudes',admin:'Administración',caln2:'Calendario Guardia N2',rrhh:'Resumen RRHH'};
  const adminPages=['admin','caln2','rrhh'];
  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo"><h1>NOC Turnos</h1><span>Avatel Telecom · 2026</span></div>
        <div className="nav">
          <div className="nav-section">Principal</div>
          {['today','calendar','team'].map(k=>(
            <div key={k} className={`nav-item ${page===k?'active':''}`} onClick={()=>setPage(k)}>
              <NI n={k==='today'?'today':k==='calendar'?'calendar':'team'}/>{k==='today'?'Hoy':k==='calendar'?'Calendario':'Equipo'}
            </div>
          ))}
          <div className="nav-section">Gestión</div>
          <div className={`nav-item ${page==='requests'?'active':''}`} onClick={()=>setPage('requests')}><NI n="requests"/>Solicitudes<span className="notif" style={{marginLeft:'auto'}}>3</span></div>
          <div className={`nav-item ${adminPages.includes(page)?'active':''}`} style={{justifyContent:'space-between'}}
            onClick={()=>{setAdminOpen(o=>!o);if(!adminPages.includes(page))setPage('admin');}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}><NI n="admin"/>Administración</div>
            <span style={{fontSize:9,transition:'transform .2s',display:'inline-block',transform:adminOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
          </div>
          {adminOpen&&(
            <div style={{paddingLeft:12}}>
              {[{k:'admin',l:'Panel admin'},{k:'caln2',l:'Calendario N2'},{k:'rrhh',l:'Resumen RRHH'}].map(({k,l})=>(
                <div key={k} className={`nav-item ${page===k?'active':''}`} style={{fontSize:12,padding:'7px 10px'}} onClick={()=>setPage(k)}>
                  <span style={{width:6,height:6,borderRadius:'50%',background:page===k?'var(--blue)':'var(--text3)',flexShrink:0,marginLeft:4}}/>{l}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="sidebar-bottom">
          <div style={{padding:'8px 12px',fontSize:12,color:'var(--text3)'}}>
            <div style={{marginBottom:3}}>v2.6 — Fix Aprobar/Rechazar</div>
            <div>{EMPS.length} operadores · 1.624h · 203 jornadas</div>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:12,color:'var(--text3)'}}>{new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--bg4)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:'var(--blue)',cursor:'pointer'}}>SR</div>
          </div>
        </div>
        <div className="content"><Pg/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
