<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Turnos — Avatel</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2435;--bg4:#252d42;
  --border:#2a3350;--border2:#3a4566;
  --text:#e8eaf2;--text2:#8892b0;--text3:#4a5578;
  --blue:#4f8ef7;--blue2:#1e3a6e;--blue3:#0d1f3c;
  --teal:#00d9b8;--amber:#f7b84f;--amber2:#7a5520;
  --red:#f75f5f;--red2:#5c1f1f;
  --green:#4fc97a;--green2:#1a4d2e;
  --orange:#fb923c;--orange2:#7c3612;--orange3:#3d1a08;
  --weekend-bg:rgba(79,142,247,0.07);
  --weekend-border:rgba(79,142,247,0.3);
  --festivo-bg:rgba(247,184,79,0.13);
  --festivo-border:rgba(247,184,79,0.55);
  --radius:10px;--radius-sm:6px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:var(--font);font-size:14px;color:var(--text)}
input,select,textarea{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,rgba(79,142,247,.06) 0%,transparent 100%)}
.sidebar-logo h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.sidebar-logo span{font-size:11px;color:var(--text3);font-family:var(--mono)}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;transition:all .15s;font-size:13px;margin-bottom:2px;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:500;border-left-color:var(--blue)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:12px 12px 6px}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;background:var(--bg2);box-shadow:0 1px 6px rgba(0,0,0,.2)}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* Badges — D now orange */
.badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;border-radius:4px;min-width:22px;height:22px;padding:0 4px}
.badge-M{background:#1a3a6e;color:#7eb8f7}
.badge-T{background:#3d2a1a;color:#f7b84f}
.badge-N{background:#2a1a4a;color:#c084fc}
.badge-V{background:#1a3d2a;color:#4fc97a}
.badge-B{background:#3d1a1a;color:#f75f5f}
.badge-D{background:var(--orange3);color:var(--orange)}
.badge-DN{background:rgba(239,68,68,.15);color:#f87171}
.badge-O{background:#2d2a1a;color:#fbbf24}
.badge-P{background:#1a2e2e;color:#2dd4bf}
.badge-empty{background:transparent;color:var(--text3)}
/* Calendar */
.cal-wrapper{overflow-x:auto}
.cal-table{width:100%;border-collapse:separate;border-spacing:0}
.cal-table th{position:sticky;top:0;z-index:2;background:var(--bg3);color:var(--text3);font-size:10px;font-weight:500;padding:6px 3px;text-align:center;border-bottom:1px solid var(--border);min-width:32px}
.cal-table th.name-col{text-align:left;left:0;z-index:3;min-width:150px;padding-left:10px}
.cal-table td{padding:3px 2px;text-align:center;border-bottom:1px solid rgba(42,51,80,.3)}
.cal-table td.name-cell{text-align:left;position:sticky;left:0;background:var(--bg2);z-index:1;padding:3px 10px;white-space:nowrap;font-size:13px}
.cal-table tr:hover td,.cal-table tr:hover td.name-cell{background:var(--bg3)}
.th-weekend{background:#182240!important;color:#7eb8f7!important;border-bottom:2px solid rgba(79,142,247,.4)!important}
.td-weekend{background:var(--weekend-bg)!important}
.th-festivo{background:#2a1c06!important;color:var(--amber)!important;border-bottom:2px solid var(--festivo-border)!important}
.td-festivo{background:var(--festivo-bg)!important;border-left:1px solid rgba(247,184,79,.2)!important;border-right:1px solid rgba(247,184,79,.2)!important}
.th-today{background:var(--blue3)!important;color:var(--blue)!important;border-bottom:2px solid var(--blue)!important}
.td-today{background:rgba(79,142,247,.1)!important;border-left:1px solid rgba(79,142,247,.3)!important}
/* Multi-select cell highlight */
.td-selected{outline:2px solid var(--blue)!important;outline-offset:-1px;background:rgba(79,142,247,.18)!important;cursor:pointer}
.cell-edit{cursor:pointer}
.cell-edit:hover .badge{outline:2px solid var(--blue)}
/* Coverage bars */
.cov-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.cov-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0}
.cov-bar{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.cov-fill{height:100%;border-radius:4px}
.cov-ok{background:var(--teal)}.cov-warn{background:var(--amber)}.cov-bad{background:var(--red)}
.cov-count{font-size:11px;font-family:var(--mono);color:var(--text2);width:40px;text-align:right}
/* Requests */
.req-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.req-av{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
.req-info{flex:1;min-width:0}
.req-name{font-size:13px;font-weight:500}
.req-desc{font-size:11px;color:var(--text2);margin-top:2px}
.req-actions{display:flex;gap:6px;flex-shrink:0}
/* Buttons */
.btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;border:1px solid transparent}
.btn-primary{background:linear-gradient(135deg,#5a9af8,#3d7ae8);color:#fff;border-color:#3d7ae8;box-shadow:0 2px 6px rgba(79,142,247,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#4d8df0,#2f6fd8);box-shadow:0 3px 10px rgba(79,142,247,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 1px 3px rgba(79,142,247,.3)}
.btn-ghost{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-ok{background:var(--green2);color:var(--green);border-color:var(--green2)}
.btn-ok:hover{background:#1f5c36;color:#6fe89a}
.btn-danger{background:var(--red2);color:var(--red);border-color:var(--red2)}
.btn-danger:hover{background:#6b2222}
.btn-warn{background:var(--amber2);color:var(--amber);border-color:var(--amber2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{width:28px;height:28px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
/* Tables */
.emp-table{width:100%;border-collapse:collapse}
.emp-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;border-bottom:1px solid var(--border)}
.emp-table td{padding:10px;border-bottom:1px solid rgba(42,51,80,.4);font-size:13px}
.emp-table tr:last-child td{border-bottom:none}
.emp-table tr:hover td{background:var(--bg3)}
.hbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;width:90px;display:inline-block;vertical-align:middle;margin-right:6px}
.hfill{height:100%;border-radius:3px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.pill-ok{background:var(--green2);color:var(--green)}
.pill-warn{background:var(--amber2);color:var(--amber)}
.pill-bad{background:var(--red2);color:var(--red)}
.pill-blue{background:var(--blue3);color:var(--blue)}
.pill-purple{background:#2a1a4a;color:#c084fc}
.pill-amber{background:rgba(247,184,79,.15);color:#f7b84f}
.pill-neutral{background:var(--bg4);color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.fg{margin-bottom:14px}.fl{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue)}
.fs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Misc */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.notif{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;background:var(--red);color:#fff;border-radius:8px;font-size:10px;font-weight:600;padding:0 4px}
.today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.shift-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;border-left:3px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.sbt{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sb-M{border-left-color:#7eb8f7!important}.sb-M .sbt{color:#7eb8f7}
.sb-T{border-left-color:#f7b84f!important}.sb-T .sbt{color:#f7b84f}
.sb-N{border-left-color:#c084fc!important}.sb-N .sbt{color:#c084fc}
.sp{font-size:13px;padding:5px 0;border-bottom:1px solid rgba(42,51,80,.4)}
.sp:last-child{border-bottom:none}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px}
.alert-warn{background:rgba(247,184,79,.1);border:1px solid rgba(247,184,79,.3);color:var(--amber)}
.alert-info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--blue)}
.alert-ok{background:rgba(79,201,122,.1);border:1px solid rgba(79,201,122,.3);color:var(--green)}
.month-nav{display:flex;align-items:center;gap:12px}
.mnb{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px}
.mnb:hover{background:var(--bg4);color:var(--text)}
.mt{font-size:14px;font-weight:500;min-width:130px;text-align:center}
/* Coverage rule editor */
.rule-row{display:grid;grid-template-columns:1fr 100px 80px 80px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,51,80,.35)}
.rule-row:last-child{border-bottom:none}
.rule-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;color:var(--text);font-size:12px;width:100%;outline:none}
.rule-input:focus{border-color:var(--blue)}
.rule-num{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;color:var(--text);font-size:12px;width:100%;outline:none;text-align:center;font-family:var(--mono)}
.rule-num:focus{border-color:var(--blue)}
/* Multi-select banner */
.sel-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--blue3);border:1px solid var(--blue2);border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px}
/* ── Coverage panel C ──────────────────────────────────────────────────────── */
.covc-wrap{margin-top:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.covc-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.covc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.covc-legend{display:flex;gap:12px;margin-left:auto}
.covc-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.covc-leg-dot{width:7px;height:7px;border-radius:50%}
.covc-scroll{overflow-x:auto}
.covc-grid{display:grid;min-width:max-content}
.covc-lbl{display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:600;color:var(--text2);border-right:1px solid var(--border);border-bottom:1px solid rgba(42,51,80,.25);height:32px;gap:6px;white-space:nowrap;min-width:110px}
.covc-lbl small{font-size:9px;color:var(--text3);font-family:var(--mono);margin-left:2px}
.covc-lbl.last{border-bottom:none}
.covc-spacer{display:flex;align-items:center;padding:0 12px;font-size:8px;color:var(--text3);letter-spacing:.06em;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:22px;min-width:110px}
.covc-hcell{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;font-size:9px;color:var(--text3);height:22px;min-width:38px;border-right:1px solid rgba(42,51,80,.2);border-bottom:1px solid var(--border)}
.covc-hcell.we{color:#7eb8f7;background:rgba(79,142,247,.04)}.covc-hcell.fe{color:var(--amber);background:rgba(247,184,79,.05)}.covc-hcell.tod{color:var(--blue);background:rgba(79,142,247,.08);border-bottom:2px solid var(--blue)}
.covc-cell{display:flex;align-items:center;justify-content:center;height:32px;min-width:38px;border-right:1px solid rgba(42,51,80,.2);border-bottom:1px solid rgba(42,51,80,.25)}
.covc-cell.we{background:rgba(79,142,247,.04)}.covc-cell.fe{background:rgba(247,184,79,.04)}.covc-cell.tod{background:rgba(79,142,247,.08)}
.covc-cell.last{border-bottom:none}
.covc-pill{font-size:10px;font-family:var(--mono);font-weight:600;padding:1px 6px;border-radius:3px}
.covc-ok{background:rgba(79,201,122,.12);color:var(--green)}.covc-warn{background:rgba(247,184,79,.14);color:var(--amber)}.covc-bad{background:rgba(247,95,95,.12);color:var(--red)}
/* ── LOGIN ─────────────────────────────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{margin-bottom:32px;text-align:center}
.login-logo h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.login-logo p{font-size:12px;color:var(--text3)}
.login-logo .login-icon{width:52px;height:52px;background:var(--blue2);border:1px solid var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.login-err{background:var(--red2);border:1px solid rgba(247,95,95,.4);color:var(--red);padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:14px}
.login-hint{margin-top:16px;text-align:center;font-size:11px;color:var(--text3)}
/* ── OPERATOR DASHBOARD ───────────────────────────────────────────────────── */
.op-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.op-shift-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,51,80,.4)}
.op-shift-item:last-child{border-bottom:none}
.op-req-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,51,80,.4);font-size:12px}
.op-req-item:last-child{border-bottom:none}
/* ── PROFILE ──────────────────────────────────────────────────────────────── */
.profile-avatar{width:80px;height:80px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--blue);background:var(--bg4);margin:0 auto 8px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.profile-avatar:hover{opacity:.8}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-success{background:var(--green2);border:1px solid rgba(79,201,122,.3);color:var(--green);padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:14px}
/* ── SIDEBAR USER BLOCK ───────────────────────────────────────────────────── */
.sidebar-user{padding:10px 12px;border-top:1px solid var(--border)}
.sidebar-user-info{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-user-av{width:28px;height:28px;border-radius:50%;background:var(--blue2);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0;overflow:hidden}
.sidebar-user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sidebar-user-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-role{font-size:10px;color:var(--text3);text-transform:capitalize}
.sidebar-user-actions{display:flex;gap:6px}
.sidebar-user-actions .nav-item{flex:1;font-size:11px;padding:5px 8px;margin:0;border-radius:var(--radius-sm)}
/* ── LIGHT THEME ─────────────────────────────────────────────────────────── */
body.light-theme{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#f5f6fb;--bg4:#ebecf5;
  --border:#dde0ef;--border2:#c8cde3;
  --text:#1a2040;--text2:#3d4a72;--text3:#7a85a3;
  --blue:#3b7ef5;--blue2:#e3ecfd;--blue3:#d4e5ff;
  --teal:#00bfa5;
  --green:#27ae60;--green2:#e6f7ed;
  --red:#e53935;--red2:#fdecea;
  --amber:#d97706;--amber2:#fef3d0;
  --orange:#ea580c;--orange2:#fed7aa;--orange3:#fff0e6;
  --weekend-bg:rgba(59,126,245,0.05);--weekend-border:rgba(59,126,245,0.18);
  --festivo-bg:rgba(217,119,6,0.07);--festivo-border:rgba(217,119,6,0.3);
}
/* Light theme component overrides */

// Helper para llamar al EF manage-auth-user con sesión refrescada y errores normalizados
// Devuelve siempre { ok:boolean, data?:object, error?:string, status?:number }
async function callManageAuth(body) {
  try {
    // Refrescar sesión — el access_token caduca en 1h, pero puede estar stale
    try { await sb.auth.refreshSession(); } catch (e) { /* si falla, seguimos con getSession */ }
    const { data: sd } = await sb.auth.getSession();
    if (!sd?.session?.access_token) return { ok:false, error:'Sesión no válida. Vuelve a iniciar sesión.', status:401 };
    // sb.functions.invoke gestiona headers automáticamente usando la sesión actual del cliente
    const { data, error } = await sb.functions.invoke('manage-auth-user', { body });
    if (error) {
      // error.context puede tener el response body; intentamos extraer mensaje
      let ctxMsg = '';
      try {
        if (error.context && typeof error.context.json === 'function') {
          const j = await error.context.json();
          ctxMsg = j?.error || j?.message || j?.msg || '';
        }
      } catch (e) {}
      return { ok:false, error: ctxMsg || error.message || 'Error desconocido', status: error.status || 0, raw: error };
    }
    // Si el EF devuelve {error} como 200 (ocurre en algunos casos) lo tratamos como error
    if (data?.error) return { ok:false, error: data.error, status: 400, data };
    return { ok:true, data };
  } catch (ex) {
    return { ok:false, error: 'Error de red: ' + (ex?.message || ex), status: 0 };
  }
}

function genTempPassword(){
  const chars='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
  const arr=new Uint8Array(12);

async function fetchShiftsForMonth(monthIdx) {
  const key = `2026-${String(monthIdx+1).padStart(2,'0')}`;
  if (shiftsCache[key]) return shiftsCache[key];
  const start = `${key}-01`;
  const end = `${key}-${String(MD[monthIdx]).padStart(2,'0')}`;
  const { data, error } = await sb
    .from('shifts')
    .select('shift_date, shift_type, notes, employee:employee_id(short_name)')
    .gte('shift_date', start)
    .lte('shift_date', end);
  if (error) { console.error('fetchShifts error', error); return {}; }
  // Convert to {shortName: [s1,s2,...,s31]}
  // D shifts with time range stored in notes as "HH:MM-HH:MM" → "D|HH:MM-HH:MM"
  const result = {};
  if (data) {
    data.forEach(row => {
      const sn = row.employee?.short_name;
      if (!sn) return;
      const day = new Date(row.shift_date + 'T00:00:00').getDate() - 1;
      if (!result[sn]) result[sn] = Array(31).fill('');
      result[sn][day] = (row.shift_type === 'D' && row.notes) ? `D|${row.notes}` : row.shift_type;
    });
  }
  shiftsCache[key] = result;
  return result;
}

  const { error } = await sb.from('shifts').upsert(upsertData, { onConflict: 'employee_id,shift_date' });

// Convierte las reglas de BD en mínimos por turno {wk:{M,T,N}, we:{M,T,N}}
function parseCovMins(rules) {
  const wk={M:MWK.M,T:MWK.T,N:MWK.N};
  const we={M:MWE.M,T:MWE.T,N:MWE.N};
  rules.filter(r=>r.unit&&r.unit.toLowerCase().includes('operador')).forEach(r=>{
    const l=(r.label||'').toLowerCase();
    const k=l.includes('ma'+'ñana')||l.includes('manana')?'M':l.includes('tarde')?'T':l.includes('noche')?'N':null;
    if(!k)return;
    if(r.weekday_value!=null)wk[k]=r.weekday_value;
    if(r.weekend_value!=null)we[k]=r.weekend_value;
  });
  return{wk,we};
}

async function deductVacationDays(employeeId, days) {
  // Increment days_used by 'days'
  const bal = await fetchVacationBalance(employeeId);
  if (!bal) return { error: 'Sin saldo de vacaciones' };
  const newUsed = bal.days_used + days;
  if (newUsed > bal.days_total) return { error: `Saldo insuficiente (${bal.days_remaining} días disponibles)` };
  const { error } = await sb.from('vacation_balance')
    .update({ days_used: newUsed })
    .eq('employee_id', employeeId).eq('year', 2026);
  return { error, newRemaining: bal.days_total - newUsed };
}

// ── APPROVE/REJECT con efectos completos ─────────────────────────────────────
async function approveRequest(req) {
  const errors = [];
  const now = new Date().toISOString();

  if (req.type === 'cambio') {
    // 1. Obtener turnos actuales de ambos operadores en sus fechas
    const reqDate = req.requester_date;
    const tgtDate = req.target_date;

    // Get requester employee id from DB
    let reqEmpId = req.requester_id;
    let tgtEmpId = req.target_id;

    // If we only have names, resolve IDs
    if (!reqEmpId && req.name) {
      const { data: e } = await sb.from('employees').select('id').eq('full_name', req.name).maybeSingle();
      reqEmpId = e?.id;
    }
    if (!tgtEmpId && req.target_name) {
      const { data: e } = await sb.from('employees').select('id').eq('full_name', req.target_name).maybeSingle();
      tgtEmpId = e?.id;
    }

    if (reqEmpId && tgtEmpId && reqDate && tgtDate) {
      // Get current shifts for each person on their respective dates
      const { data: s1 } = await sb.from('shifts').select('shift_type,id')
        .eq('employee_id', reqEmpId).eq('shift_date', reqDate).maybeSingle();
      const { data: s2 } = await sb.from('shifts').select('shift_type,id')
        .eq('employee_id', tgtEmpId).eq('shift_date', tgtDate).maybeSingle();

      // SWAP LOGIC:
      // Requester (on reqDate) swaps with Target (on tgtDate)
      // → Requester now works tgtDate with target's original shift_type
      // → Target now works reqDate with requester's original shift_type
      // → Original entries are removed/replaced

      const shift1 = s1?.shift_type; // requester's shift on reqDate (may be null = libre)
      const shift2 = s2?.shift_type; // target's shift on tgtDate (may be null = libre)

      // Remove requester's original shift on reqDate (they won't work that day)
      if (s1?.id) {
        await sb.from('shifts').delete().eq('id', s1.id);
      }
      // Remove target's original shift on tgtDate (they won't work that day)
      if (s2?.id) {
        await sb.from('shifts').delete().eq('id', s2.id);
      }

      // Assign: requester works tgtDate with target's shift type
      if (shift2) {
        const { error: e1 } = await sb.from('shifts').upsert(
          { employee_id: reqEmpId, shift_date: tgtDate, shift_type: shift2 },
          { onConflict: 'employee_id,shift_date' }
        );
        if (e1) errors.push(`Swap upsert req→tgtDate: ${e1.message}`);
      }
      // Assign: target works reqDate with requester's shift type
      if (shift1) {
        const { error: e2 } = await sb.from('shifts').upsert(
          { employee_id: tgtEmpId, shift_date: reqDate, shift_type: shift1 },
          { onConflict: 'employee_id,shift_date' }
        );
        if (e2) errors.push(`Swap upsert tgt→reqDate: ${e2.message}`);
      }

      // Invalidate calendar cache for affected months
      const months = [reqDate?.substring(0,7), tgtDate?.substring(0,7)].filter(Boolean);
      months.forEach(mk => { delete shiftsCache[mk]; });
      window.__calendarVersion = (window.__calendarVersion||0) + 1;
    }

  } else if (req.type === 'vacaciones') {
    // Mark each day in the range as V for the requester
    let reqEmpId = req.requester_id;
    if (!reqEmpId && req.name) {
      const { data: e } = await sb.from('employees').select('id').eq('full_name', req.name).maybeSingle();
      reqEmpId = e?.id;
    }

    if (reqEmpId && req.vacation_start && req.vacation_end) {
      // Generate date range safely using string comparison
      const days = [];
      let cur = req.vacation_start;
      const endStr = req.vacation_end;
      while (cur <= endStr) {
        days.push(cur);
        const d = new Date(cur + 'T12:00:00'); // noon to avoid DST issues
        d.setDate(d.getDate() + 1);
        cur = d.toISOString().split('T')[0];
      }

      // Upsert V for each day
      for (const day of days) {
        const { error: ev } = await sb.from('shifts').upsert(
          { employee_id: reqEmpId, shift_date: day, shift_type: 'V' },
          { onConflict: 'employee_id,shift_date' }
        );
        if (ev) errors.push(`Vac insert error ${day}: ${ev.message}`);
      }

      // Deduct from vacation balance
      const { error: ebal, newRemaining } = await deductVacationDays(reqEmpId, days.length);
      if (ebal) errors.push(`Balance error: ${ebal}`);

      // Invalidate calendar cache — clear affected months
      const months = [...new Set(days.map(d => d.substring(0,7)))];
      months.forEach(mk => { 
        delete shiftsCache[mk];
        // Also try clearing with full key format
        Object.keys(shiftsCache).filter(k => k.startsWith(mk)).forEach(k => delete shiftsCache[k]);
      });
      window.__calendarVersion = (window.__calendarVersion||0) + 1;
    }
  }

  // Mark request as approved in DB
  const { error: eStatus } = await sb.from('shift_requests')
    .update({ status: 'approved', resolved_at: now })
    .eq('id', req.id);
  if (eStatus) errors.push(`Status error: ${eStatus.message}`);

  // Audit log
  await logAudit('request_approved', {request_id:req.id, type:req.type, requester_id:req.requester_id});

  return errors;
}

// Helper: obtiene los turnos de varios (empleado, fecha) en una sola query
// Devuelve Map con clave `${empId}_${date}` → shift_type ('M','T','N','D','V','P',etc) o null si libre
async function fetchShiftsFor(empIds, dates) {
  const map = {};
  if (!empIds?.length || !dates?.length) return map;
  const uniqEmps = [...new Set(empIds.filter(Boolean))];
  const uniqDates = [...new Set(dates.filter(Boolean))];
  const { data } = await sb.from('shifts').select('employee_id,shift_date,shift_type')
    .in('employee_id', uniqEmps).in('shift_date', uniqDates);

function Bdg({s}){
  const base=s?s.split('|')[0]:'';
  if(!base)return<span className="badge badge-empty">–</span>;
  return<span className={`badge badge-${base}`} title={s&&s.includes('|')?s.split('|')[1]:''}>{base}</span>;
}

function TodayView(){
  const t=new Date(),mi=t.getMonth(),d=t.getDate();
  const [md,setMd]=useState({});
  const [loading,setLoading]=useState(true);
  const [covMins,setCovMins]=useState({wk:MWK,we:MWE});
  const [emps,setEmps]=useState(EMPS);
  const [empShortMap,setEmpShortMap]=useState(EMP_SHORT);
  useEffect(()=>{
    sb.from('employees').select('full_name,short_name,role').eq('active',true).order('full_name').then(({data})=>{
      if(data&&data.length>0){
        setEmps(data.filter(e=>e.role==='operator').map(e=>e.full_name));
        const m={};data.forEach(e=>{m[e.full_name]=e.short_name;});setEmpShortMap(m);
      }
    });
  },[]);
  const [todayVer, setTodayVer] = React.useState(window.__calendarVersion||0);
  useEffect(()=>{
    const iv = setInterval(()=>{ const v=window.__calendarVersion||0; if(v!==todayVer) setTodayVer(v); },1000);
    return ()=>clearInterval(iv);
  },[todayVer]);
  useEffect(()=>{
    fetchCoverageRules().then(rules=>setCovMins(parseCovMins(rules)));
  },[]);
  useEffect(()=>{
    setLoading(true);
    const key = `2026-${String(mi+1).padStart(2,'0')}`;
    delete shiftsCache[key];
    fetchShiftsForMonth(mi).then(data=>{setMd(data);setLoading(false)});
  },[mi,todayVer]);
  const w={M:[],T:[],N:[]};
  emps.forEach(e=>{const ek=empShortMap[e]||EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];if(s==='M')w.M.push(e);if(s==='T')w.T.push(e);if(s==='N')w.N.push(e);});
  const fest=isFest(mi,d),isWEnd=isWE(mi,d),mr=isWEnd?covMins.we:covMins.wk;
  const ok=w.M.length>=mr.M&&w.T.length>=mr.T&&w.N.length>=mr.N;
  const absent=emps.filter(e=>{const ek=empShortMap[e]||EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];return s==='B'||s==='V';});
  if(loading) return <div style={{padding:40,color:'var(--text3)',textAlign:'center'}}>⏳ Cargando datos...</div>;
  return(
    <div>
      <div style={{marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
        <div>
          <div style={{fontSize:22,fontWeight:600}}>{t.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
            {fest?<span style={{color:'var(--amber)'}}>⚡ Festivo Madrid — Bonificación activa</span>
            :isWEnd?<span style={{color:'var(--blue)'}}>Fin de semana — Cobertura mínima: {mr.M}M/{mr.T}T/{mr.N}N</span>
            :`Día laborable — Cobertura mínima: ${mr.M}M/${mr.T}T/${mr.N}N`}
          </div>
        </div>
        <span className={`pill ${ok?'pill-ok':'pill-bad'}`} style={{marginLeft:'auto'}}>{ok?'✓ Cobertura correcta':'⚠ Cobertura insuficiente'}</span>
      </div>
      <div className="today-grid">
        {[{k:'M',l:'Mañana',ti:'07:00–15:00',ws:w.M,mn:mr.M,c:'sb-M'},{k:'T',l:'Tarde',ti:'15:00–23:00',ws:w.T,mn:mr.T,c:'sb-T'},{k:'N',l:'Noche',ti:'23:00–07:00',ws:w.N,mn:mr.N,c:'sb-N'}].map(({k,l,ti,ws,mn,c})=>(
          <div key={k} className={`shift-block ${c}`}>
            <div className="sbt"><Bdg s={k}/>{l}<span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{ti}</span></div>
            {ws.length===0?<div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>Sin operadores</div>:ws.map(w=><div key={w} className="sp">{w}</div>)}
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)'}}>
              <span>{ws.length} operadores</span><span style={{color:ws.length>=mn?'var(--green)':'var(--red)'}}>Mín: {mn}</span>
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Ausencias hoy</span></div>
        {absent.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>Sin ausencias registradas</div>
        :absent.map(e=>{const ek=empShortMap[e]||EMP_SHORT[e]||e;const s=(md[ek]||[])[d-1];return(
          <div key={e} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(42,51,80,.3)'}}>
            <span>{e}</span><span className={`pill ${s==='B'?'pill-bad':'pill-warn'}`} style={{marginLeft:'auto'}}>{SL[s]||''}</span>
          </div>);})}
      </div>
    </div>
  );
}

// ── CALENDAR ───────────────────────────────────────────────────────────────────
function CalendarView({isAdmin=true}){
  const today=new Date();
  const [mi,setMi]=useState(today.getMonth());
  const [shifts,setShifts]=useState(SD);
  // Multi-select state: {emp, days: Set of day indices}
  const [sel,setSel]=useState(null); // {emp, days: Set}
  const [batchModal,setBatchModal]=useState(false);
  const [batchShift,setBatchShift]=useState('M');
  const [dStart,setDStart]=useState('07:00');
  const [dEnd,setDEnd]=useState('22:00');
  const [covMins,setCovMins]=useState({wk:MWK,we:MWE});
  const [emps,setEmps]=useState(EMPS);
  const [empShortMap,setEmpShortMap]=useState(EMP_SHORT);
  // Reload coverage rules on mount and whenever admin saves changes
  const [covVer,setCovVer]=useState(window.__coverageVersion||0);
  useEffect(()=>{const iv=setInterval(()=>{const v=window.__coverageVersion||0;if(v!==covVer)setCovVer(v);},1000);return()=>clearInterval(iv);},[covVer]);
  useEffect(()=>{fetchCoverageRules().then(rules=>setCovMins(parseCovMins(rules)));},[covVer]);
  useEffect(()=>{
    sb.from('employees').select('full_name,short_name,role').eq('active',true).order('full_name').then(({data})=>{
      if(data&&data.length>0){
        setEmps(data.filter(e=>e.role==='operator').map(e=>e.full_name));
        const m={};data.forEach(e=>{m[e.full_name]=e.short_name;});setEmpShortMap(m);
      }
    });
  },[]);

  const [dbShifts,setDbShifts]=useState({});
  const [calLoading,setCalLoading]=useState(false);
  const [batchSaving,setBatchSaving]=useState(false);
  const [batchErr,setBatchErr]=useState(null);
  // Force fresh fetch when: month changes OR calendar version changes (after approval)
  const [calVer, setCalVer] = React.useState(window.__calendarVersion||0);
  useEffect(()=>{
    // Poll for version changes (works even when calendar is not focused)
    const interval = setInterval(()=>{
      const v = window.__calendarVersion||0;
      if(v !== calVer) {
        setCalVer(v);
      }
    }, 500);
    return ()=>clearInterval(interval);
  },[calVer]);
  useEffect(()=>{
    setCalLoading(true);
    // Always delete cache for current month before fetching (ensures fresh data)
    const key = `2026-${String(mi+1).padStart(2,'0')}`;
    delete shiftsCache[key];
    fetchShiftsForMonth(mi).then(data=>{setDbShifts(data);setCalLoading(false);});
  },[mi, calVer]);
  const mk=MONTHS[mi],days=MD[mi];
  // Merge: dbShifts override static SD for loaded months
  const md = {...(SD[mk]||{}),...dbShifts};
  const di=useMemo(()=>Array.from({length:days},(_,i)=>({we:isWE(mi,i+1),fe:isFest(mi,i+1),to:isTod(mi,i+1),dow:new Date(2026,mi,i+1).getDay()})),[mi,days]);
  const cov=useMemo(()=>Array.from({length:days},(_,i)=>{let m=0,t=0,n=0;emps.forEach(e=>{const ek=empShortMap[e]||EMP_SHORT[e]||e;const s=(md[ek]||[])[i];if(s==='M')m++;if(s==='T')t++;if(s==='N')n++;});return{m,t,n};}),[mi,md,days,emps,empShortMap]);

  const thcls=info=>{if(info.fe)return 'th-festivo';if(info.to)return 'th-today';if(info.we)return 'th-weekend';return '';};
  const tdcls=info=>{if(info.fe)return 'td-festivo';if(info.to)return 'td-today';if(info.we)return 'td-weekend';return '';};

  const handleCellClick=(emp,dayIdx)=>{
    if(!isAdmin)return;
    setSel(prev=>{
      if(!prev||prev.emp!==emp){
        // Start new selection for this employee
        return{emp,days:new Set([dayIdx])};
      }
      // Toggle day in existing selection for same employee
      const nd=new Set(prev.days);
      if(nd.has(dayIdx))nd.delete(dayIdx);else nd.add(dayIdx);
      return nd.size===0?null:{emp,days:nd};
    });
  };

  const applyBatch=async()=>{
    if(!sel)return;
    setBatchSaving(true);setBatchErr(null);
    const empKey=empShortMap[sel.emp]||EMP_SHORT[sel.emp]||sel.emp;
    const dNotes=batchShift==='D'?`${dStart}-${dEnd}`:null;
    const results=await Promise.all([...sel.days].map(dayIdx=>{
      const date=`2026-${String(mi+1).padStart(2,'0')}-${String(dayIdx+1).padStart(2,'0')}`;
      return saveShift(empKey, date, batchShift, dNotes);
    }));
    const errors=results.filter(r=>r?.error);
    if(errors.length>0){
      setBatchErr(`Error al guardar: ${errors[0].error?.message||errors[0].error}`);
      setBatchSaving(false);return;
    }
    // Invalidar caché y refrescar
    const mk=`2026-${String(mi+1).padStart(2,'0')}`;
    delete shiftsCache[mk];
    window.__calendarVersion=(window.__calendarVersion||0)+1;
    const updated=await fetchShiftsForMonth(mi);
    setDbShifts(updated);
    setBatchSaving(false);setSel(null);setBatchModal(false);
  };

  const clearSel=()=>setSel(null);

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16,flexWrap:'wrap'}}>
        <div className="month-nav">
          <button className="mnb" onClick={()=>{setMi(i=>(i+11)%12);setSel(null);}}>‹</button>
          <span className="mt">{MN[mi]} 2026</span>
          <button className="mnb" onClick={()=>{setMi(i=>(i+1)%12);setSel(null);}}>›</button>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginLeft:'auto',alignItems:'center'}}>
          {Object.entries(SL).map(([k,v])=><span key={k} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text2)'}}><Bdg s={k}/> {v}</span>)}
          <span style={{fontSize:11,padding:'2px 8px',background:'var(--festivo-bg)',border:'1px solid var(--festivo-border)',borderRadius:4,color:'var(--amber)'}}>⚡ Festivo</span>
          <span style={{fontSize:11,padding:'2px 8px',background:'var(--weekend-bg)',border:'1px solid var(--weekend-border)',borderRadius:4,color:'#7eb8f7'}}>◻ Finde</span>
        </div>
      </div>

      {calLoading&&<div className="alert alert-info" style={{marginBottom:12}}><span>⏳</span><span>Cargando turnos desde la base de datos...</span></div>}
      {isAdmin&&!sel&&!calLoading&&(
        <div className="alert alert-info" style={{marginBottom:12}}>
          <span>✏️</span>
          <span>Modo admin — haz clic en celdas de un mismo operador para seleccionarlas. Selecciona varios días y aplica el turno de una vez.</span>
        </div>
      )}

      {isAdmin&&sel&&(
        <div className="sel-banner">
          <span style={{color:'var(--blue)'}}>✓</span>
          <span><strong>{sel.emp}</strong> — {sel.days.size} día{sel.days.size!==1?'s':''} seleccionado{sel.days.size!==1?'s':''}</span>
          <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
            <button className="btn btn-ghost btn-sm" onClick={clearSel}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setBatchModal(true)}>Asignar turno →</button>
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="cal-wrapper">
          <table className="cal-table">
            <thead>
              <tr>
                <th className="name-col">Operador</th>
                {di.map((info,i)=>(
                  <th key={i} className={thcls(info)}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                      {info.fe&&<span style={{fontSize:8}}>⚡</span>}
                      <span style={{fontSize:10}}>{i+1}</span>
                      <span style={{fontSize:9,opacity:.7}}>{DN[info.dow]}</span>
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {emps.map(emp=>(
                <tr key={emp}>
                  <td className="name-cell">{emp}</td>
                  {di.map((info,i)=>{
                    const empKey=empShortMap[emp]||EMP_SHORT[emp]||emp;
                    const s=(md[empKey]||[])[i]||'';
                    const isSel=sel&&sel.emp===emp&&sel.days.has(i);

                    return(

            </tbody>
            <tfoot>
              {/* ── Separador + título ── */}
              <tr>

                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:13}}>📊</span>
                    <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--text3)'}}>Cobertura diaria</span>
                    <div style={{display:'flex',gap:12,marginLeft:'auto'}}>
                      {[['var(--green)','Cumple mínimo'],['var(--amber)','Justo (−1)'],['var(--red)','Insuficiente']].map(([c,l])=>(

              {/* ── Mañana ── */}
              <tr style={{background:'var(--bg3)'}}>
                <td className="name-cell" style={{padding:'4px 10px',borderBottom:'1px solid rgba(42,51,80,.25)'}}>
                  <span style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,color:'var(--text2)'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:'#7eb8f7',flexShrink:0,display:'inline-block'}}></span>
                    Mañana<span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>≥{covMins.wk.M}/{covMins.we.M}</span>
                  </span>
                </td>
                {cov.map(({m},i)=>{
                  const mr=(di[i].we?covMins.we:covMins.wk).M;
                  const cls=m>=mr?'covc-ok':m>=mr-1?'covc-warn':'covc-bad';
                  return(<td key={i} className={tdcls(di[i])} style={{padding:'4px 2px',textAlign:'center',borderBottom:'1px solid rgba(42,51,80,.25)'}}>

                  const cls=t>=mr?'covc-ok':t>=mr-1?'covc-warn':'covc-bad';
                  return(<td key={i} className={tdcls(di[i])} style={{padding:'4px 2px',textAlign:'center',borderBottom:'1px solid rgba(42,51,80,.25)'}}>
                    <span className={`covc-pill ${cls}`}>{t}/{mr}</span>
                  </td>);
                })}
              </tr>
              {/* ── Noche ── */}
              <tr style={{background:'var(--bg3)'}}>
                <td className="name-cell" style={{padding:'4px 10px'}}>
                  <span style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:600,color:'var(--text2)'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:'#c084fc',flexShrink:0,display:'inline-block'}}></span>
                    Noche<span style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>≥{covMins.wk.N}/{covMins.we.N}</span>
                  </span>
                </td>
                {cov.map(({n},i)=>{
                  const mr=(di[i].we?covMins.we:covMins.wk).N;
                  const cls=n>=mr?'covc-ok':n>=mr-1?'covc-warn':'covc-bad';
                  return(<td key={i} className={tdcls(di[i])} style={{padding:'4px 2px',textAlign:'center'}}>

            <div className="modal-title">Asignar turno en bloque</div>
            <div className="modal-sub">
              {sel.emp} — {sel.days.size} días seleccionados en {MN[mi]}
              <div style={{marginTop:6,fontSize:11,color:'var(--text3)'}}>
                Días: {[...sel.days].sort((a,b)=>a-b).map(d=>d+1).join(', ')}
              </div>

              {['M','T','N','V','B','D','O',''].map(s=>(
                <button key={s||'x'} onClick={()=>setBatchShift(s||'')}

                  <Bdg s={s}/><span style={{fontSize:10,color:'var(--text2)'}}>{s?SL[s]:'Libre'}</span>

                  Rango horario · Turno D
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{flex:1}}>

                      style={{padding:'6px 8px',fontSize:13,fontFamily:'var(--mono)',textAlign:'center'}}/>
                  </div>
                  <div style={{color:'var(--text3)',marginTop:14,fontSize:14}}>→</div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:4}}>Hora fin</label>
                    <input type="time" className="fi" value={dEnd} onChange={e=>setDEnd(e.target.value)}
                      style={{padding:'6px 8px',fontSize:13,fontFamily:'var(--mono)',textAlign:'center'}}/>
                  </div>
                </div>
                <div style={{marginTop:8,fontSize:10,color:'var(--text3)'}}>
                  {(()=>{
                    const [sh,sm]=(dStart||'07:00').split(':').map(Number);
                    const [eh,em]=(dEnd||'22:00').split(':').map(Number);
                    const startM=sh*60+(sm||0);const endM=eh*60+(em||0);
                    const diffH=Math.round((endM<=startM?(1440-startM+endM):(endM-startM))/60*10)/10;
                    const isNight=sh>=22||sh<7;
                    return isNight
                      ?<span style={{color:'#f87171'}}>⚡ Nocturno · <strong>{diffH}h</strong> → Horas Festivos en RRHH</span>
                      :<span style={{color:'var(--orange)'}}>☀ Diurno · <strong>{diffH}h</strong> → Horas Extra en RRHH</span>;
                  })()}
                </div>
              </div>
            )}
            {batchErr&&<div className="login-err" style={{marginBottom:10,padding:'6px 10px',fontSize:12}}>⚠ {batchErr}</div>}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" disabled={batchSaving} onClick={()=>{setBatchModal(false);setBatchErr(null);}}>Cancelar</button>
              <button className="btn btn-primary" disabled={batchSaving} onClick={applyBatch}>
                {batchSaving?'Guardando…':`Aplicar a ${sel.days.size} día${sel.days.size!==1?'s':''}`}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TEAM ───────────────────────────────────────────────────────────────────────
function TeamView(){
  const today=new Date(),mi=today.getMonth(),d=today.getDate();
  const [md,setMd]=useState({});
  const [vacBalances,setVacBalances]=useState({});
  const [annualStats,setAnnualStats]=useState({});
  const [statsLoading,setStatsLoading]=useState(true);
  const [emps,setEmps]=useState(EMPS);
  const [empShortMap,setEmpShortMap]=useState(EMP_SHORT);

  // FIX: vacVer declarado ANTES de los useEffect que lo usan (evita TDZ bug)
  const [vacVer,setVacVer]=React.useState(window.__calendarVersion||0);

  // Polling de versión de calendario para refrescar tras cambios en el calendario
  useEffect(()=>{
    const iv=setInterval(()=>{const v=window.__calendarVersion||0;if(v!==vacVer)setVacVer(v);},1000);
    return()=>clearInterval(iv);
  },[vacVer]);

  // Carga lista dinámica de operadores desde BD
  useEffect(()=>{
    sb.from('employees').select('full_name,short_name,role').eq('active',true).order('full_name').then(({data})=>{
      if(data&&data.length>0){
        setEmps(data.filter(e=>e.role==='operator').map(e=>e.full_name));
        const m={};data.forEach(e=>{m[e.full_name]=e.short_name;});setEmpShortMap(m);
      }
    });
  },[]);

  // Carga turno del mes actual — se refresca cuando vacVer cambia
  useEffect(()=>{
    delete shiftsCache[`2026-${String(mi+1).padStart(2,'0')}`];
    fetchShiftsForMonth(mi).then(setMd);
  },[mi,vacVer]);

  // Carga estadísticas anuales con paginación (Supabase limita a 1000 filas por query)
  useEffect(()=>{
    setStatsLoading(true);
    (async()=>{
      const PAGE=1000;
      let allRows=[];
      let from=0;
      while(true){
        const{data,error}=await sb.from('shifts')
          .select('shift_type,notes,employee:employee_id(short_name)')
          .gte('shift_date','2026-01-01')
          .lte('shift_date','2026-12-31')
          .range(from,from+PAGE-1);
        if(error||!data||data.length===0)break;
        allRows=allRows.concat(data);
        if(data.length<PAGE)break;
        from+=PAGE;
      }
      // Helper: calcula horas reales de un turno D a partir de notes ('HH:MM-HH:MM')
      const calcDHours=(notes)=>{
        if(!notes)return 8;
        const parts=notes.split('-');
        if(parts.length<2)return 8;
        const[sh,sm]=(parts[0]||'07:00').split(':').map(Number);
        const[eh2,em]=(parts[1]||'22:00').split(':').map(Number);
        const startM=sh*60+(isNaN(sm)?0:sm);
        const endM=eh2*60+(isNaN(em)?0:em);
        return Math.round((endM<=startM?(1440-startM+endM):(endM-startM))/60*10)/10;
      };
      const stats={};
      allRows.forEach(row=>{
        const sn=row.employee?.short_name;
        if(!sn)return;
        if(!stats[sn])stats[sn]={M:0,T:0,N:0,V:0,B:0,D:0,P:0,dHours:0};
        const t=row.shift_type;
        if(t==='D'){stats[sn].D++;stats[sn].dHours+=calcDHours(row.notes);}
        else if(t in stats[sn])stats[sn][t]++;
      });
      Object.values(stats).forEach(s=>{s.h=(s.M+s.T+s.N+s.P)*8+s.dHours;});
      setAnnualStats(stats);
      setStatsLoading(false);
    })();
  },[vacVer]);

  // Carga saldo de vacaciones desde BD — se refresca cuando vacVer cambia
  useEffect(()=>{
    sb.from('vacation_balance').select('days_remaining,days_used,employee:employee_id(short_name)').eq('year',2026).then(({data})=>{
      if(!data)return;
      const map={};
      data.forEach(r=>{if(r.employee?.short_name)map[r.employee.short_name]={remaining:r.days_remaining,used:r.days_used};});
      setVacBalances(map);
    });
  },[vacVer]);

  // Turno actual del día de hoy
  function getTurno(emp){
    const empKey=empShortMap[emp]||EMP_SHORT[emp]||emp;
    const raw=(md[empKey]||[])[d-1]||'';
    const s=raw.split('|')[0];
    const hrs=raw.includes('|')?raw.split('|')[1]:'';
    if(s==='M')return{label:'Mañana',cls:'pill-blue',av:'#7eb8f7'};
    if(s==='T')return{label:'Tarde',cls:'pill-amber',av:'#f7b84f'};
    if(s==='N')return{label:'Noche',cls:'pill-purple',av:'#c084fc'};
    if(s==='D')return{label:hrs?`H.ext ${hrs}`:'H. extras',cls:'pill-warn',av:'#f7b84f'};
    if(s==='O')return{label:'Onboarding',cls:'pill-neutral',av:'var(--text3)'};
    return{label:'Libre',cls:'pill-ok',av:'var(--green)'};
  }
  function getSituacion(emp){
    const empKey=empShortMap[emp]||EMP_SHORT[emp]||emp;
    const s=(md[empKey]||[])[d-1]||'';
    if(s==='B')return{label:'Baja',cls:'pill-bad',av:'var(--red)'};
    if(s==='V')return{label:'Vacaciones',cls:'pill-warn',av:'var(--amber)'};
    return null;
  }
  function getInitials(emp){
    const key=(empShortMap[emp]||EMP_SHORT[emp]||emp).trim();
    const parts=key.split(/\s+/);
    return(parts.length>=2?parts[0][0]+parts[1][0]:key.substring(0,2)).toUpperCase();
  }

  // Estadísticas por operador usando datos reales de BD
  const ed=useMemo(()=>emps.map(emp=>{
    const shortKey=empShortMap[emp]||EMP_SHORT[emp]||emp;
    const r=annualStats[shortKey]||{};
    const h=r.h||0;
    const j=(r.M||0)+(r.T||0)+(r.N||0);
    const eh=r.dHours||0;
    const hst=h>HMAX?'bad':h>HMAX*.92?'warn':'ok';
    const vac=vacBalances[shortKey];
    return{emp,r,h,j,eh,hst,shortKey,vacUsed:vac?.used??r.V??0,vacRemaining:vac?.remaining??null};
  }),[emps,empShortMap,annualStats,vacBalances]);

  const totalHours=useMemo(()=>ed.reduce((s,e)=>s+e.h,0),[ed]);
  const totalJornadas=useMemo(()=>ed.reduce((s,e)=>s+e.j,0),[ed]);

  const vacas=emps.filter(e=>(md[empShortMap[e]||EMP_SHORT[e]||e]||[])[d-1]==='V');

            <span className="stat-val" style={{color:'var(--teal)'}}>{emps.length}</span>
            <span style={{fontSize:12,color:'var(--text3)'}}>operadores</span>

          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:1}}>Hoy ausentes</div>
            {bajas.length===0&&vacas.length===0&&<span style={{fontSize:12,color:'var(--green)'}}>✓ Sin ausencias</span>}
            {bajas.map(e=><div key={e} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}><span className="pill pill-bad" style={{fontSize:10,padding:'1px 6px'}}>Baja</span><span style={{color:'var(--text2)'}}>{e.split(' ')[0]}</span></div>)}
            {vacas.map(e=><div key={e} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}><span className="pill pill-warn" style={{fontSize:10,padding:'1px 6px'}}>Vacac.</span><span style={{color:'var(--text2)'}}>{e.split(' ')[0]}</span></div>)}
          </div>
        </div>
        {/* TOP HORAS EXTRA */}
        <div className="stat">
          <div className="stat-label">Horas Extra</div>
          {(()=>{
            const totalExtra=ed.reduce((s,e)=>s+e.eh,0);
            const top3=[...ed].filter(e=>e.eh>0).sort((a,b)=>b.eh-a.eh).slice(0,3);
            return(<>
              <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:8}}>
                <span className="stat-val" style={{color:'var(--blue)'}}>{totalExtra}h</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>total equipo</span>
              </div>
              {top3.length===0
                ?<span style={{fontSize:12,color:'var(--text3)'}}>Sin horas extra</span>
                :<div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {top3.map(e=><div key={e.emp} style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                    <span style={{color:'var(--text2)'}}>{e.emp.split(' ')[0]}</span>
                    <span style={{color:'var(--blue)',fontWeight:600}}>{e.eh}h</span>
                  </div>)}
                </div>
              }
            </>);
          })()}
        </div>
        {/* Alertas horas */}
        <div className="stat">
          <div className="stat-label">Alertas horas</div>
          <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}}>
            <span className="stat-val" style={{color:alertCount>0?'var(--amber)':'var(--green)'}}>{alertCount}</span>

          <div className="stat-sub">sobre el 92% de {HMAX}h pactadas</div>

        {/* Ausencias hoy */}

            <span style={{fontSize:12,color:'var(--text3)'}}>ausentes</span>
          </div>
          <div style={{display:'flex',gap:16}}>
            <span style={{fontSize:12,color:'var(--text3)'}}><span style={{color:'var(--amber)',fontWeight:700}}>{vacas.length}</span> vacaciones</span>
            <span style={{fontSize:12,color:'var(--text3)'}}><span style={{color:'var(--red)',fontWeight:700}}>{bajas.length}</span> bajas</span>
