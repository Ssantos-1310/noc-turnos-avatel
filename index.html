// ── REQUESTS ───────────────────────────────────────────────────────────────────
function RequestsView(){
  const [modal,setModal]=useState(null);
  const [reqs,setReqs]=useState(REQS);
  const reqsRef = React.useRef(REQS); // Always-current ref for async handlers
  const [reqLoading,setReqLoading]=useState(true);
  // Keep ref in sync with state
  useEffect(()=>{ reqsRef.current = reqs; },[reqs]);
  useEffect(()=>{ if(!reqLoading) window.__pendingReqs = reqs.length; },[reqs, reqLoading]);
  // Named handlers — defined once in component scope, always see current closure
  const handleApprove = async (reqId) => {
    const r = reqsRef.current.find(x => x.id === reqId);
    if(!r) return;
    setReqs(prev=>prev.filter(x=>x.id!==reqId));
    if(!reqId || !reqId.includes('-')) return;
    const empId = r.requester_id;
    if(r.type==='vacaciones' && empId && r.vacation_start && r.vacation_end){
      const days=[]; let cur=r.vacation_start;
      while(cur<=r.vacation_end){
        days.push(cur);
        const dd=new Date(cur+'T12:00:00'); dd.setDate(dd.getDate()+1);
        cur=dd.toISOString().split('T')[0];
      }
      for(const day of days){
        await sb.from('shifts').upsert({employee_id:empId,shift_date:day,shift_type:'V'},{onConflict:'employee_id,shift_date'});
      }
      const {data:bal}=await sb.from('vacation_balance').select('days_used,days_total').eq('employee_id',empId).eq('year',2026).single();
      if(bal) await sb.from('vacation_balance').update({days_used:bal.days_used+days.length}).eq('employee_id',empId).eq('year',2026);
      [...new Set(days.map(d=>d.substring(0,7)))].forEach(mk=>{delete shiftsCache[mk];});
      window.__calendarVersion=(window.__calendarVersion||0)+1;
    } else if(r.type==='cambio' && empId && r.requester_date && r.target_date && r.target_id){
      const {data:s1}=await sb.from('shifts').select('shift_type,id').eq('employee_id',empId).eq('shift_date',r.requester_date).maybeSingle();
      const {data:s2}=await sb.from('shifts').select('shift_type,id').eq('employee_id',r.target_id).eq('shift_date',r.target_date).maybeSingle();
      if(s1?.id) await sb.from('shifts').delete().eq('id',s1.id);
      if(s2?.id) await sb.from('shifts').delete().eq('id',s2.id);
      if(s2?.shift_type) await sb.from('shifts').upsert({employee_id:empId,shift_date:r.target_date,shift_type:s2.shift_type},{onConflict:'employee_id,shift_date'});
      if(s1?.shift_type) await sb.from('shifts').upsert({employee_id:r.target_id,shift_date:r.requester_date,shift_type:s1.shift_type},{onConflict:'employee_id,shift_date'});
      [r.requester_date?.substring(0,7),r.target_date?.substring(0,7)].filter(Boolean).forEach(mk=>{delete shiftsCache[mk];});
      window.__calendarVersion=(window.__calendarVersion||0)+1;
    } else if(r.type==='asuntos' && empId && r.requester_date){
      await sb.from('shifts').upsert({employee_id:empId,shift_date:r.requester_date,shift_type:'P'},{onConflict:'employee_id,shift_date'});
      delete shiftsCache[r.requester_date.substring(0,7)];
      window.__calendarVersion=(window.__calendarVersion||0)+1;
    }
    await sb.from('shift_requests').update({status:'approved',resolved_at:new Date().toISOString()}).eq('id',reqId);
  };

  const handleReject = async (reqId) => {
    setReqs(prev=>prev.filter(x=>x.id!==reqId));
    if(reqId && reqId.includes('-')) await sb.from('shift_requests').update({status:'rejected',resolved_at:new Date().toISOString()}).eq('id',reqId);
  };

  const loadReqs = ()=>{
    setReqLoading(true);
    fetchPendingRequests().then(data=>{
      const mapped = data.map(r=>({
        id: r.id,
        type: r.request_type==='swap'?'cambio':r.request_type==='personal_day'?'asuntos':'vacaciones',
        name: r.requester?.full_name||'–',
        av: (r.requester?.full_name||'??').split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase(),
        desc: r.request_type==='swap'
          ? `Cambio ${r.requester_date||'?'} → ${r.target_date||'?'}`
          : r.request_type==='personal_day'
          ? `Asuntos propios ${r.requester_date||'?'}`
          : `Vacaciones ${r.vacation_start||'?'} – ${r.vacation_end||'?'}`,
        date: new Date(r.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'short'}),
        requester_id: r.requester?.id,
        requester_date: r.requester_date,
        target_date: r.target_date,
        vacation_start: r.vacation_start,
        vacation_end: r.vacation_end,
        target_name: r.target?.full_name,
        target_id: r.target?.id,
        notes: r.notes
      }));
      setReqs(mapped);
      setReqLoading(false);
    });
  };
  useEffect(()=>{ loadReqs(); },[]);
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <h2 style={{fontSize:15,fontWeight:500}}>Solicitudes de operadores</h2>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setModal('cambio')}>+ Cambio de turno</button>
          <button className="btn btn-primary" onClick={()=>setModal('vacaciones')}>+ Solicitar vacaciones</button>
        </div>
      </div>
      <div className="alert alert-info" style={{marginBottom:16}}><span>📋</span><span>{reqLoading?'Cargando solicitudes…':`${reqs.length} solicitud${reqs.length!==1?'es':''} pendiente${reqs.length!==1?'s':''} de revisión`}</span></div>
      {reqs.map(r=>(
        <div key={r.id} className="req-item">
          <div className="req-av">{r.av}</div>
          <div className="req-info">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <span className="req-name">{r.name}</span>
              <span className="tag" style={{background:r.type==='cambio'?'var(--blue3)':'var(--green2)',color:r.type==='cambio'?'var(--blue)':'var(--green)',borderColor:r.type==='cambio'?'var(--blue2)':'var(--green2)'}}>{r.type==='cambio'?'Cambio turno':'Vacaciones'}</span>
              <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{r.date}</span>
            </div>
            <div className="req-desc">{r.desc}</div>
            {r.notes&&<div style={{fontSize:11,color:'var(--text3)',marginTop:3,fontStyle:'italic'}}>💬 {r.notes}</div>}
          </div>
          <div className="req-actions">
                          <button className="btn btn-ok btn-sm" onClick={()=>handleApprove(r.id)}>✓ Aprobar</button>
              <button className="btn btn-danger btn-sm" onClick={()=>handleReject(r.id)}>✗ Rechazar</button>
          </div>
        </div>
      ))}
      {modal&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{modal==='cambio'?'Solicitar cambio de turno':'Solicitar vacaciones'}</div>
            <div className="modal-sub">La solicitud será enviada a responsables por Teams y correo</div>
            {modal==='cambio'?(
              <>
                <div className="fg">
                  <label className="fl">Tu nombre (solicitante)</label>
                  <select className="fs" id="req-emp-select">
                    <option value="">Selecciona tu nombre</option>
                    {EMPS.map(e=><option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="frow">
                  <div className="fg">
                    <label className="fl">Tu día (cedes)</label>
                    <input type="date" id="req-my-date" className="fi" defaultValue="2026-04-01"/>
                  </div>
                  <div className="fg">
                    <label className="fl">Día que quieres trabajar</label>
                    <input type="date" id="req-tgt-date" className="fi" defaultValue="2026-04-02"/>
                  </div>
                </div>
                <div className="fg">
                  <label className="fl">Con quién cambias</label>
                  <select className="fs" id="req-tgt-emp">
                    <option value="">Selecciona operador</option>
                    {EMPS.map(e=><option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
              </>
            ):(
              <>
                <div className="fg">
                  <label className="fl">Tu nombre (solicitante)</label>
                  <select className="fs" id="req-emp-select">
                    <option value="">Selecciona tu nombre</option>
                    {EMPS.map(e=><option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="frow">
                  <div className="fg">
                    <label className="fl">Fecha inicio</label>
                    <input type="date" id="req-vac-start" className="fi" defaultValue="2026-05-01"/>
                  </div>
                  <div className="fg">
                    <label className="fl">Fecha fin</label>
                    <input type="date" id="req-vac-end" className="fi" defaultValue="2026-05-07"/>
                  </div>
                </div>
              </>
            )}
            <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={async()=>{
                const empSel = document.getElementById('req-emp-select');
                const empName = empSel?.value;
                if(!empName){alert('Selecciona tu nombre');return;}
                let{data:emp}=await sb.from('employees').select('id').eq('full_name',empName).maybeSingle();
                if(!emp){const{data:e2}=await sb.from('employees').select('id').eq('short_name',empName).maybeSingle();emp=e2;}
                if(!emp){alert('Operador no encontrado en BD');return;}
                const isSwap=modal==='cambio';
                let insertData={request_type:isSwap?'swap':'vacation',requester_id:emp.id,status:'pending'};
                if(isSwap){
                  const myDate=document.getElementById('req-my-date')?.value;
                  const tgtDate=document.getElementById('req-tgt-date')?.value;
                  const tgtName=document.getElementById('req-tgt-emp')?.value;
                  if(!myDate||!tgtDate){alert('Selecciona las fechas del cambio');return;}
                  insertData.requester_date=myDate;
                  insertData.target_date=tgtDate;
                  if(tgtName){
                    let{data:tgt}=await sb.from('employees').select('id').eq('full_name',tgtName).maybeSingle();
                    if(!tgt){const{data:t2}=await sb.from('employees').select('id').eq('short_name',tgtName).maybeSingle();tgt=t2;}
                    if(tgt)insertData.target_id=tgt.id;
                  }
                }else{
                  const vStart=document.getElementById('req-vac-start')?.value;
                  const vEnd=document.getElementById('req-vac-end')?.value;
                  if(!vStart||!vEnd){alert('Selecciona las fechas de vacaciones');return;}
                  if(vEnd<vStart){alert('Fecha fin debe ser posterior al inicio');return;}
                  insertData.vacation_start=vStart;
                  insertData.vacation_end=vEnd;
                }
                const{error}=await sb.from('shift_requests').insert(insertData);
                if(error){alert('Error: '+error.message);return;}
                setModal(null);
                loadReqs();
                alert('✓ Solicitud enviada correctamente. Los responsables recibirán la notificación.');
              }}>Enviar solicitud</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN ──────────────────────────────────────────────────────────────────────
function HistorialView(){
  const [hist,setHist]=useState([]);
  const [loading,setLoading]=useState(true);
  const [open,setOpen]=useState(false);
  const [cancelling,setCancelling]=useState(null);

  useEffect(()=>{
    if(!open)return;
    setLoading(true);
    fetchRequestHistory(100).then(({data})=>{setHist(data);setLoading(false);});
  },[open]);

  // Revierte un único swap (un par requester_date ↔ target_date) a su estado previo
  const revertSwap=async(req)=>{
    const empId=req.requester_id;
    if(!empId||!req.target_id||!req.requester_date||!req.target_date)return;
    const {data:cur1}=await sb.from('shifts').select('shift_type,id').eq('employee_id',empId).eq('shift_date',req.target_date).maybeSingle();
    const {data:cur2}=await sb.from('shifts').select('shift_type,id').eq('employee_id',req.target_id).eq('shift_date',req.requester_date).maybeSingle();
    if(cur1?.id)await sb.from('shifts').delete().eq('id',cur1.id);
    if(cur2?.id)await sb.from('shifts').delete().eq('id',cur2.id);
    if(cur2?.shift_type)await sb.from('shifts').upsert({employee_id:empId,shift_date:req.requester_date,shift_type:cur2.shift_type},{onConflict:'employee_id,shift_date'});
    if(cur1?.shift_type)await sb.from('shifts').upsert({employee_id:req.target_id,shift_date:req.target_date,shift_type:cur1.shift_type},{onConflict:'employee_id,shift_date'});
  };

  const cancelRequest=async(h)=>{
    // Si es un grupo de cambio multi-día, revierte TODOS los pares
    const isGroup=h._isGroup;
    const label=isGroup?`${h._count} cambios de turno de ${h.requester_name}`:`la solicitud de ${h.requester_name}`;
    if(!confirm(`¿Cancelar ${label}?\nSe revertirán los cambios aplicados.`))return;
    setCancelling(h.id);

    if(isGroup&&h._rows){
      // Revertir cada par del grupo
      for(const req of h._rows){await revertSwap(req);}
      const months=new Set();
      h._rows.forEach(r=>{months.add(r.requester_date?.substring(0,7));months.add(r.target_date?.substring(0,7));});
      months.forEach(mk=>{if(mk)delete shiftsCache[mk];});
      window.__calendarVersion=(window.__calendarVersion||0)+1;
      // Marcar todas las filas como cancelled
      for(const r of h._rows){
        await sb.from('shift_requests').update({status:'cancelled',resolved_at:new Date().toISOString()}).eq('id',r.id);
      }
      setHist(prev=>prev.map(x=>x.id===h.id?{...x,status:'cancelled'}:x));
      setCancelling(null);
      return;
    }

    // Rutas antiguas (1 fila individual)
    const {data:req}=await sb.from('shift_requests').select('*').eq('id',h.id).single();
    if(!req){setCancelling(null);return;}
    const empId=req.requester_id;

    if(req.request_type==='vacation'&&empId&&req.vacation_start&&req.vacation_end){
      const days=[];let cur=req.vacation_start;
      while(cur<=req.vacation_end){
        days.push(cur);
        const dd=new Date(cur+'T12:00:00');dd.setDate(dd.getDate()+1);cur=dd.toISOString().split('T')[0];
      }
      for(const day of days){
        await sb.from('shifts').delete().eq('employee_id',empId).eq('shift_date',day).eq('shift_type','V');
      }
      const {data:bal}=await sb.from('vacation_balance').select('days_used').eq('employee_id',empId).eq('year',2026).single();
      if(bal){await sb.from('vacation_balance').update({days_used:Math.max(0,bal.days_used-days.length)}).eq('employee_id',empId).eq('year',2026);}
      [...new Set(days.map(d=>d.substring(0,7)))].forEach(mk=>{delete shiftsCache[mk];});
      window.__calendarVersion=(window.__calendarVersion||0)+1;

    }else if(req.request_type==='personal_day'&&empId&&req.requester_date){
      await sb.from('shifts').delete().eq('employee_id',empId).eq('shift_date',req.requester_date).eq('shift_type','P');
      delete shiftsCache[req.requester_date.substring(0,7)];
      window.__calendarVersion=(window.__calendarVersion||0)+1;

    }else if(req.request_type==='swap'){
      await revertSwap(req);
      [req.requester_date?.substring(0,7),req.target_date?.substring(0,7)].filter(Boolean).forEach(mk=>{if(mk)delete shiftsCache[mk];});
      window.__calendarVersion=(window.__calendarVersion||0)+1;
    }

    await sb.from('shift_requests').update({status:'cancelled',resolved_at:new Date().toISOString()}).eq('id',h.id);
    setHist(prev=>prev.map(x=>x.id===h.id?{...x,status:'cancelled'}:x));
    setCancelling(null);
  };

  // Agrupa solicitudes por swap_group_id para mostrar los cambios multi-día como una sola entrada
  const groupedHist=useMemo(()=>{
    const groups={};const nonSwap=[];
    hist.forEach(h=>{
      if(h.request_type==='swap'){
        const gk=h.swap_group_id||`solo_${h.id}`;
        (groups[gk]=groups[gk]||[]).push(h);
      }else{nonSwap.push(h);}
    });
    const out=[];
    Object.entries(groups).forEach(([gk,rows])=>{
      const first=rows[0];
      const multi=rows.length>1;
      out.push({...first,id:gk,_isGroup:multi,_count:rows.length,_rows:rows,_sortKey:first.resolved_at||first.created_at});
    });
    nonSwap.forEach(h=>out.push({...h,_sortKey:h.resolved_at||h.created_at}));
    out.sort((a,b)=>new Date(b._sortKey)-new Date(a._sortKey));
    return out;
  },[hist]);

  const TYPE_LABEL={'swap':'Cambio turno','vacation':'Vacaciones','personal_day':'Asuntos propios'};
  const STATUS_COLOR={'approved':'var(--green)','rejected':'var(--red)','cancelled':'var(--text3)'};
  const STATUS_LABEL={'approved':'Aprobada','rejected':'Rechazada','cancelled':'Cancelada'};

  return(
    <div className="card" style={{marginBottom:16}}>
      <div className="card-header" style={{cursor:'pointer'}} onClick={()=>setOpen(p=>!p)}>
        <span className="card-title">Historial de solicitudes {groupedHist.length>0&&`(${groupedHist.length})`}</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>{open?'▲ ocultar':'▼ ver historial'}</span>
      </div>
      {open&&(
        <div>
          {loading&&<div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>Cargando historial...</div>}
          {!loading&&groupedHist.length===0&&<div style={{fontSize:12,color:'var(--text3)',padding:'8px 0'}}>No hay solicitudes resueltas aún.</div>}
          {!loading&&groupedHist.length>0&&(
            <div style={{maxHeight:340,overflowY:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead style={{position:'sticky',top:0,background:'var(--bg2)',zIndex:1}}>
                <tr style={{borderBottom:'1px solid var(--border)',color:'var(--text3)'}}>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Operador</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Tipo</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Detalle</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Motivo</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Estado</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Aprobador</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontWeight:500}}>Fecha</th>
                  <th style={{padding:'6px 4px'}}></th>
                </tr>
              </thead>
              <tbody>
                {groupedHist.map(h=>(
                  <tr key={h.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)',opacity:h.status==='cancelled'?.45:1}}>
                    <td style={{padding:'6px 8px',fontWeight:500}}>{h.requester_name}</td>
                    <td style={{padding:'6px 8px',color:'var(--text3)'}}>{h._isGroup?`Cambio turno · ${h._count}d`:(TYPE_LABEL[h.request_type]||h.request_type)}</td>
                    <td style={{padding:'6px 8px',color:'var(--text3)'}}>
                      {h.request_type==='swap'
                        ?(h._isGroup
                          ?`${h._count} días con ${h.target_name||'–'}`
                          :(h.requester_date&&h.target_date
                            ?`${h.requester_date} ↔ ${h.target_date} con ${h.target_name||'–'}`
                            :`con ${h.target_name||'–'}`))
                        :h.request_type==='personal_day'
                        ?(h.requester_date||'–')
                        :(h.vacation_start&&h.vacation_end
                          ?`${h.vacation_start} – ${h.vacation_end} (${h.vacation_days||'?'}d)`
                          :'–')}
                    </td>
                    <td style={{padding:'6px 8px',color:'var(--text3)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11,fontStyle:'italic'}} title={h.requester_notes||''}>{h.requester_notes||'–'}</td>
                    <td style={{padding:'6px 8px'}}>
                      <span style={{color:STATUS_COLOR[h.status]||'var(--text2)',fontWeight:600}}>{STATUS_LABEL[h.status]||h.status}</span>
                    </td>
                    <td style={{padding:'6px 8px',color:'var(--text3)'}}>{h.approver_name||'–'}</td>
                    <td style={{padding:'6px 8px',fontFamily:'var(--mono)',color:'var(--text3)',fontSize:11}}>
                      {h.resolved_at?new Date(h.resolved_at).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'–'}
                    </td>
                    <td style={{padding:'6px 4px',textAlign:'right'}}>
                      {h.status==='approved'&&(
                        <button className="btn btn-danger btn-sm" style={{fontSize:10,padding:'2px 8px'}} disabled={cancelling===h.id} onClick={()=>cancelRequest(h)}>
                          {cancelling===h.id?'…':'✕ Cancelar'}
                        </button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AdminView({currentUser}){
  const [showNE,setShowNE]=useState(false);
  const [editingEmp,setEditingEmp]=useState(null);
  const [empSaving,setEmpSaving]=useState(false);
  const [newUser,setNewUser]=useState({role:'operator',firstName:'',lastName:'',email:'',joinDate:'',baseShift:'M'});
  const [newUErr,setNewUErr]=useState('');
  const [createdTempPwd,setCreatedTempPwd]=useState(null); // contraseña temporal generada tras alta
  const [confirmPwd,setConfirmPwd]=useState('');           // confirmación al resetear contraseña
  const [pwdResetMsg,setPwdResetMsg]=useState('');         // feedback reset contraseña
  const [deletingEmp,setDeletingEmp]=useState(null);       // empleado pendiente de eliminación permanente
  const [deleteConfirmText,setDeleteConfirmText]=useState(''); // texto de confirmación escrito por admin
  const [deleteLoading,setDeleteLoading]=useState(false);
  const [deleteErr,setDeleteErr]=useState('');
  const diagResultsRef=React.useRef(null);
  const [diagResults,setDiagResults]=useState(null);
  const [diagLoading,setDiagLoading]=useState(false);
  const [empList,setEmpList]=useState([]);
  const [empLoading,setEmpLoading]=useState(true);
  const [adminReqs,setAdminReqs]=useState([]);
  const [adminReqsLoading,setAdminReqsLoading]=useState(true);

  const resetNewUser=()=>setNewUser({role:'operator',firstName:'',lastName:'',email:'',joinDate:'',baseShift:'M'});
  const saveNewUser=async()=>{
    const {firstName,lastName,email,role,joinDate}=newUser;
    if(!firstName.trim()||!lastName.trim()){setNewUErr('Nombre y apellidos son obligatorios');return;}
    if(!email.trim()){setNewUErr('El email corporativo es obligatorio');return;}
    const full_name=`${firstName.trim()} ${lastName.trim()}`;
    const parts=lastName.trim().split(' ');
    const short_name=`${firstName.trim()} ${parts[0]}`;
    const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'.');
    const username=`${norm(firstName.trim())}.${norm(parts[0])}`;
    setEmpSaving(true);setNewUErr('');
    const tempPwd=genTempPassword(); // contraseña aleatoria segura — nunca hardcodeada
    const rec={full_name,short_name,email:email.trim(),role,active:true,username};
    if(role==='operator'&&joinDate)rec.join_date=joinDate;
    const {data:inserted,error}=await sb.from('employees').insert(rec).select('id').single();
    if(error){setNewUErr(error.message);setEmpSaving(false);return;}
    // Crear usuario en Supabase Auth via Edge Function (usa sb.functions.invoke)
    let authOk=false,authErrMsg='',authRecovered=false;
    const authRes=await callManageAuth({action:'create',email:email.trim().toLowerCase(),password:tempPwd,full_name,role});
    if(authRes.ok&&authRes.data?.auth_id){
      const{error:linkErr}=await sb.from('employees').update({auth_id:authRes.data.auth_id}).eq('id',inserted.id);
      if(linkErr){authErrMsg='Cuenta creada pero no pudo vincularse al empleado: '+linkErr.message;}
      else{authOk=true;authRecovered=!!authRes.data.recovered;}
    }else{
      authErrMsg=authRes.status===401
        ?'Sesión caducada (HTTP 401). Cierra sesión y vuelve a entrar antes de crear usuarios.'
        :`La cuenta de acceso no pudo crearse${authRes.status?` (HTTP ${authRes.status})`:''}: ${authRes.error||'sin detalles'}`;
    }
    // Auto-crear saldo de vacaciones para operadores nuevos
    if(role==='operator'&&inserted?.id){
      await sb.from('vacation_balance').insert({employee_id:inserted.id,year:2026});
    }
    // Refrescar lista — conservar estado previo si el fetch falla (evita que el listado se vacíe)
    const{data:fresh,error:fetchErr}=await sb.from('employees').select('*').order('full_name');
    if(!fetchErr&&Array.isArray(fresh))setEmpList(fresh);
    setEmpSaving(false);setShowNE(false);resetNewUser();
    // Mostrar siempre el modal con la contraseña generada — el admin debe comunicarla al empleado
    setCreatedTempPwd({name:full_name,email:email.trim(),pwd:tempPwd,authOk,authErrMsg,authRecovered});
  };

  const loadAdminReqs=()=>{
    setAdminReqsLoading(true);
    fetchPendingRequests().then(data=>{
      // Agrupar solicitudes de cambio de turno por swap_group_id (solicitudes multi-día)
      // Para vacaciones y asuntos, cada fila es independiente
      const groups={}; // key=synthetic group id, value=array of shifted_request rows
      const nonSwap=[];
      data.forEach(r=>{
        if(r.request_type==='swap'){
          const gk=r.swap_group_id||`solo_${r.id}`;
          (groups[gk]=groups[gk]||[]).push(r);
        }else{
          nonSwap.push(r);
        }
      });

      const mapped=[];
      // Solicitudes de cambio agrupadas
      Object.entries(groups).forEach(([gk,rows])=>{
        const first=rows[0];
        const multi=rows.length>1;
        const pairs=rows.map(r=>({
          id:r.id,
          reqDate:r.requester_date,
          reqShift:r.requester_shift,
          tgtDate:r.target_date,
          tgtShift:r.target_shift,
        })).sort((a,b)=>(a.reqDate||'').localeCompare(b.reqDate||''));
        mapped.push({
          id:gk, // synthetic group id
          isGroup:multi,
          groupId:first.swap_group_id||null,
          ids:rows.map(r=>r.id), // todas las filas que componen este grupo
          type:'cambio',
          name:first.requester?.full_name||'–',
          av:(first.requester?.full_name||'??').split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase(),
          desc:multi
            ?`Cambio de ${rows.length} días con ${first.target?.full_name||'?'}`
            :`Cambio ${first.requester_date||'?'} → ${first.target_date||'?'} con ${first.target?.full_name||'?'}`,
          date:new Date(first.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'short'}),
          requester_id:first.requester?.id,
          target_id:first.target?.id,
          target_name:first.target?.full_name,
          pairs, // array de pares con turno
          notes:first.notes,
        });
      });
      // Vacaciones/asuntos — sin cambios
      nonSwap.forEach(r=>mapped.push({
        id:r.id,
        isGroup:false,
        ids:[r.id],
        type:r.request_type==='personal_day'?'asuntos':'vacaciones',
        name:r.requester?.full_name||'–',
        av:(r.requester?.full_name||'??').split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase(),
        desc:r.request_type==='personal_day'
          ?`Asuntos propios ${r.requester_date||'?'}`
          :`Vacaciones ${r.vacation_start||'?'} – ${r.vacation_end||'?'}`,
        date:new Date(r.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'short'}),
        requester_id:r.requester?.id,
        target_id:null,
        requester_date:r.requester_date,
        vacation_start:r.vacation_start,
        vacation_end:r.vacation_end,
        notes:r.notes,
      }));
      // Ordenar por fecha de creación descendente
      mapped.sort((a,b)=>new Date(b._created||0)-new Date(a._created||0));
      setAdminReqs(mapped);
      setAdminReqsLoading(false);
    });
  };

  useEffect(()=>{
    fetchEmployees().then(data=>{setEmpList(data||[]);setEmpLoading(false);});
    loadAdminReqs();
  },[]);
  const [rules,setRules]=useState(INIT_RULES);

                </>
              )}
            </div>

          {editRules&&(

              <span>ℹ️</span><span>Modifica los valores directamente. Los cambios se aplican al guardar.</span>

          )}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function LoginView({onLogin}){
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [countdown,setCountdown]=useState(0);
  // Lockout por email — cada usuario tiene su propio contador, no bloquea a toda la web
  const FAIL_KEY='noc_login_fails_v2';
  const MAX_FAILS=5;
  const LOCKOUT_S=180; // 3 minutos de bloqueo tras MAX_FAILS intentos fallidos consecutivos

  // Helpers para leer/escribir el mapa de fallos por email
  const loadFails=()=>{try{return JSON.parse(localStorage.getItem(FAIL_KEY)||'{}');}catch(ex){return{};}};
  const saveFails=(m)=>{try{localStorage.setItem(FAIL_KEY,JSON.stringify(m));}catch(ex){}};
  const normEmail=(s)=>(s||'').trim().toLowerCase();

  // Comprobar si el email actual está bloqueado (recalcula cuando cambia email)
  useEffect(()=>{
    const em=normEmail(email);
    if(!em){setCountdown(0);return;}
    const m=loadFails();
    const e=m[em];
    if(e?.until&&Date.now()<e.until){
      setCountdown(Math.ceil((e.until-Date.now())/1000));
    }else{
      setCountdown(0);
      // limpiar entrada caducada
      if(e?.until&&Date.now()>=e.until){delete m[em];saveFails(m);}
    }
  },[email]);

  // Countdown timer — al llegar a 0, resetea el contador del email actual
  useEffect(()=>{
    if(countdown<=0)return;
    const iv=setInterval(()=>{
      setCountdown(c=>{
        if(c<=1){
          clearInterval(iv);
          const em=normEmail(email);
          const m=loadFails();
          if(m[em]){delete m[em];saveFails(m);}
          return 0;
        }
        return c-1;
      });
    },1000);
    return()=>clearInterval(iv);
  },[countdown,email]);

  const handleLogin=async(e)=>{
    e.preventDefault();
    if(countdown>0){setError(`Acceso bloqueado para este usuario. Espera ${countdown}s`);return;}
    if(!email.trim()||!password){setError('Introduce email y contraseña');return;}
    const em=normEmail(email);
    setLoading(true);setError('');

    // Autenticar con Supabase Auth
    const {data:authData,error:authErr}=await sb.auth.signInWithPassword({email:em,password});

    if(authErr||!authData?.user){
      setLoading(false);
      const m=loadFails();
      const entry=m[em]||{fails:0};
      entry.fails=(entry.fails||0)+1;
      if(entry.fails>=MAX_FAILS){
        entry.until=Date.now()+LOCKOUT_S*1000;
        m[em]=entry;saveFails(m);
        setCountdown(LOCKOUT_S);
        setError(`Demasiados intentos fallidos para ${em}. Bloqueado ${LOCKOUT_S}s.`);
      }else{
        m[em]=entry;saveFails(m);
        setError(`Credenciales incorrectas (${entry.fails}/${MAX_FAILS} intentos para ${em})`);
      }
      return;
    }

    // Obtener registro de empleado vinculado
    const {data:user}=await sb.from('employees').select('*')
      .eq('auth_id',authData.user.id).eq('active',true).maybeSingle();
    setLoading(false);

    if(!user){
      await sb.auth.signOut();
      setError('Cuenta no encontrada o inactiva. Contacta con el Responsable NOC.');
      return;
    }

    // Limpiar intentos fallidos de este email al loguear con éxito
    const m=loadFails();
    if(m[em]){delete m[em];saveFails(m);}
    await logAudit('login',{username:user.username,role:user.role},user.id);
    onLogin(user);
  };

  const locked=countdown>0;
  return(
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-icon">📡</div>
          <h1>NOC Turnos</h1>
          <p>Avatel Telecom · Network Operations Center</p>
        </div>
        {error&&<div className="login-err">⚠ {error}</div>}
        {locked&&<div style={{textAlign:'center',fontSize:12,color:'var(--amber)',marginBottom:10}}>🔒 {email||'este usuario'} bloqueado — {countdown}s</div>}
        <form onSubmit={handleLogin}>
          <div className="fg"><label className="fl">Correo electrónico</label>
            <input className="fi" type="email" placeholder="usuario@avatel.es" value={email} onChange={e=>setEmail(e.target.value)} autoFocus autoComplete="email" disabled={locked}/>
          </div>
          <div className="fg"><label className="fl">Contraseña</label>
            <input className="fi" type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} autoComplete="current-password" disabled={locked}/>
          </div>
          <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'11px',marginTop:8,fontSize:14,fontWeight:600}} disabled={loading||locked}>
            {locked?`Bloqueado (${countdown}s)`:loading?'Accediendo…':'Entrar'}
          </button>
        </form>
        <div className="login-hint">¿Olvidaste tu contraseña? Contacta con el Responsable NOC</div>
      </div>
    </div>
  );
}

// ── PENDING BADGE (para sidebar dinámico) ─────────────────────────────────────
function PendingBadge({style}){
  const [count,setCount]=useState(window.__pendingReqs||0);
  useEffect(()=>{const t=setInterval(()=>setCount(window.__pendingReqs||0),2000);return()=>clearInterval(t);},[]);
  if(!count)return null;
  return <span className="notif" style={style}>{count}</span>;
}

  const [myReqs,setMyReqs]=useState([]);

  const [modal,setModal]=useState(null);
  const [notifications,setNotifications]=useState([]);
  const [showNotifs,setShowNotifs]=useState(false);

  useEffect(()=>{
    async function loadYear(){
      const [{data:shifts},{data:reqs}]=await Promise.all([
        sb.from('shifts').select('shift_date,shift_type').eq('employee_id',user.id)
          .gte('shift_date','2026-01-01').lte('shift_date','2026-12-31').order('shift_date'),
        sb.from('shift_requests').select('*').eq('requester_id',user.id)
          .order('created_at',{ascending:false}).limit(20)

      setMyReqs(reqs||[]);
      const bal=await fetchVacationBalance(user.id);
      setMyBalance(bal);
      setLoading(false);
    }
    loadYear();
  },[user.id]);

  useEffect(()=>{
    fetchShiftsForMonth(selMonth).then(data=>setMonthData(data));
  },[selMonth]);

  const userShifts=useMemo(()=>{
    const sn=user.short_name;
    const dbRow=monthData[sn]||[];
    return Array.from({length:MD[selMonth]},(_,i)=>dbRow[i]||'');
  },[monthData,user.short_name,selMonth]);

  const stats=useMemo(()=>{
    let m=0,t=0,n=0,d=0,a=0;
    allShifts.forEach(s=>{
      if(s.shift_type==='M')m++;
      else if(s.shift_type==='T')t++;
      else if(s.shift_type==='N')n++;
      else if(s.shift_type==='D'||s.shift_type==='DN')d++;
      else if(s.shift_type==='P')a++;

    return{m,t,n,d,a,jornadas:m+t+n+a,horas:(m+t+n+a)*8};
  },[allShifts]);

  // Realtime: notificaciones cuando cambia estado de mis solicitudes

    const ch=sb.channel('op-reqs-'+user.id)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shift_requests',filter:`requester_id=eq.${user.id}`},(payload)=>{
        const r=payload.new;
        if(r.status==='approved'||r.status==='rejected'){
          const tipo=r.request_type==='vacation'?'Vacaciones':r.request_type==='swap'?'Cambio de turno':'Asuntos propios';

        }

    return()=>sb.removeChannel(ch);

    const res=[];

    for(let i=0;i<7;i++){

      const ds=d.toISOString().split('T')[0];

            </div>
            <div style={{height:5,borderRadius:3,background:'var(--bg4)'}}>
              <div style={{height:'100%',borderRadius:3,background:'var(--amber)',width:`${Math.min(100,(stats.horas/HMAX)*100).toFixed(1)}%`,transition:'width .4s'}}/>
            </div>
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}>
              <span style={{color:'var(--text3)'}}>Jornadas</span>
              <span><span style={{fontWeight:700}}>{stats.jornadas}</span><span style={{color:'var(--text3)'}}> / {JMAX}</span></span>
            </div>
            <div style={{height:5,borderRadius:3,background:'var(--bg4)'}}>
              <div style={{height:'100%',borderRadius:3,background:'var(--blue)',width:`${Math.min(100,(stats.jornadas/JMAX)*100).toFixed(1)}%`,transition:'width .4s'}}/>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {[{k:'M',v:stats.m,c:'#7eb8f7',l:'Mañanas'},{k:'T',v:stats.t,c:'var(--amber)',l:'Tardes'},{k:'N',v:stats.n,c:'#c084fc',l:'Noches'},{k:'D',v:stats.d,c:'var(--orange)',l:'Dispon.'}].map(({k,v,c,l})=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:7,padding:'7px 12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>

              <span style={{fontSize:10,color:'var(--text3)'}}>{l}</span>

            // Agrupar swaps por swap_group_id
            const groups={};const nonSwap=[];
            myReqs.forEach(r=>{
              if(r.request_type==='swap'){
                const gk=r.swap_group_id||`solo_${r.id}`;
                (groups[gk]=groups[gk]||[]).push(r);
              }else{nonSwap.push(r);}
            });
            const items=[];
            Object.entries(groups).forEach(([gk,rows])=>{
              const first=rows[0];
              const multi=rows.length>1;
              items.push({
                ...first,
                _key:gk,
                _count:rows.length,
                _sortKey:first.created_at,
                descOverride:multi?`Cambio de ${rows.length} días`:`${first.requester_date||'?'} ↔ ${first.target_date||'?'}`,
              });
            });
            nonSwap.forEach(r=>items.push({...r,_key:r.id,_sortKey:r.created_at}));
            items.sort((a,b)=>new Date(b._sortKey)-new Date(a._sortKey));
            return items.map((r)=>{
              const ti=reqLabel(r.request_type);
              const desc=r.descOverride||(r.request_type==='personal_day'?`${r.requester_date||'?'}`:`${r.vacation_start||'?'} – ${r.vacation_end||'?'}`);
              return(
                <div key={r._key} className="op-req-item">
                  <span className="tag" style={{background:ti.bg,color:ti.c,borderColor:'transparent',fontSize:10}}>{ti.l}</span>
                  <span style={{flex:1,color:'var(--text2)'}}>{desc}</span>
                  <span className={`pill ${r.status==='approved'?'pill-ok':r.status==='rejected'?'pill-bad':r.status==='cancelled'?'pill-neutral':'pill-warn'}`} style={{fontSize:10}}>
                    {r.status==='approved'?'✓ Aprobada':r.status==='rejected'?'✗ Rechazada':r.status==='cancelled'?'✕ Cancelada':'⏳ Pendiente'}
                  </span>
                </div>
              );
            });
          })()
        }
      </div>

      {modal&&(
        <OpRequestModal modal={modal} userId={user.id} userName={user.full_name} onClose={()=>setModal(null)} onSaved={()=>{
          setModal(null);
          sb.from('shift_requests').select('*').eq('requester_id',user.id).order('created_at',{ascending:false}).limit(20).then(({data})=>setMyReqs(data||[]));
        }}/>
      )}
    </div>
  );
}

function OpRequestModal({modal,userId,userName,onClose,onSaved}){
  const [emps,setEmps]=useState([]);
  const [form,setForm]=useState({date1:'',date2:'',targetId:'',reason:''});
  // Estado específico de cambio de turno multi-día
  // pairs = [{id, reqDate, tgtDate, reqShift?, tgtShift?}]
  const [swapPairs,setSwapPairs]=useState([{id:1,reqDate:'',tgtDate:'',reqShift:null,tgtShift:null}]);
  const [shiftsLookupVer,setShiftsLookupVer]=useState(0); // trigger para recargar turnos
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const [confirming,setConfirming]=useState(false);
  useEffect(()=>{fetchEmployees().then(d=>setEmps(d||[]));},[]);

  // Al cambiar cualquier fecha o el compañero, consultamos los turnos reales y los
  // pintamos en los badges. Evitamos consultas innecesarias agrupando todas las
  // fechas en una sola llamada.
  useEffect(()=>{
    if(modal!=='cambio')return;
    const targetId=form.targetId;
    if(!targetId){setSwapPairs(prev=>prev.map(p=>({...p,reqShift:null,tgtShift:null})));return;}
    const reqDates=swapPairs.map(p=>p.reqDate).filter(Boolean);
    const tgtDates=swapPairs.map(p=>p.tgtDate).filter(Boolean);
    const allDates=[...new Set([...reqDates,...tgtDates])];
    if(allDates.length===0)return;
    fetchShiftsFor([userId,targetId],allDates).then(map=>{
      setSwapPairs(prev=>prev.map(p=>({
        ...p,
        reqShift:p.reqDate?(map[`${userId}_${p.reqDate}`]||null):null,
        tgtShift:p.tgtDate?(map[`${targetId}_${p.tgtDate}`]||null):null,
      })));
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[form.targetId,shiftsLookupVer,modal,userId]);

  const updatePair=(id,field,val)=>{
    setSwapPairs(prev=>prev.map(p=>p.id===id?{...p,[field]:val,[field==='reqDate'?'reqShift':'tgtShift']:null}:p));
    setShiftsLookupVer(v=>v+1);
  };
  const addPair=()=>setSwapPairs(prev=>[...prev,{id:Date.now(),reqDate:'',tgtDate:'',reqShift:null,tgtShift:null}]);
  const removePair=(id)=>setSwapPairs(prev=>prev.length>1?prev.filter(p=>p.id!==id):prev);

  // "Completar semana" — a partir del PRIMER par (que el usuario ya haya rellenado),
  // añade los 6 días siguientes consecutivos tanto para su fecha como para la del compañero.
  // Si no hay par base con fechas, toma la próxima semana laboral (lunes).
  const addWeek=()=>{
    setErr('');
    // Buscar el último par con ambas fechas rellenas como "base" — es el más reciente que el usuario tocó
    const base=[...swapPairs].reverse().find(p=>p.reqDate&&p.tgtDate);
    let baseReq,baseTgt;
    if(base){
      baseReq=base.reqDate;
      baseTgt=base.tgtDate;
    }else{
      // Fallback: próximo lunes
      const today=new Date();
      const dayOfWeek=today.getDay();
      const monday=new Date(today);
      monday.setDate(today.getDate()-((dayOfWeek+6)%7)+7);
      baseReq=baseTgt=monday.toISOString().split('T')[0];
    }
    // Generar los 6 días siguientes al día base, tanto para reqDate como para tgtDate
    const nextDay=(dateStr,offset)=>{
      const d=new Date(dateStr+'T12:00:00');
      d.setDate(d.getDate()+offset);
      return d.toISOString().split('T')[0];
    };
    const extras=[];
    for(let i=1;i<=6;i++){
      extras.push({
        id:Date.now()+i,
        reqDate:nextDay(baseReq,i),
        tgtDate:nextDay(baseTgt,i),
        reqShift:null,tgtShift:null,
      });
    }
    // Si había un par base, lo conservamos como primero; si no, creamos uno con las fechas fallback
    const firstPair=base?{...base}:{id:Date.now(),reqDate:baseReq,tgtDate:baseTgt,reqShift:null,tgtShift:null};
    setSwapPairs([firstPair,...extras]);
    setShiftsLookupVer(v=>v+1);
  };

  const validateAsuntos=(dateStr)=>{
    if(!dateStr)return null;
    const d=new Date(dateStr+'T00:00:00');
    const dow=d.getDay();
    if(dow===0||dow===6)return'No puedes elegir fin de semana';
    if(dow===1)return'No puede ser lunes';
    if(dow===5)return'No puede ser viernes';
    if(festDates.has(dateStr))return'No puedes elegir un festivo';
    const prev=new Date(d);prev.setDate(prev.getDate()-1);
    const next=new Date(d);next.setDate(next.getDate()+1);
    if(festDates.has(prev.toISOString().split('T')[0]))return'No puede ser el día después de un festivo';
    if(festDates.has(next.toISOString().split('T')[0]))return'No puede ser el día antes de un festivo';
    return null;
  };

  const validate=()=>{
    setErr('');
    if(modal==='cambio'){
      if(!form.targetId){setErr('Selecciona el compañero con quien cambias');return false;}
      if(swapPairs.length===0){setErr('Añade al menos un día para cambiar');return false;}
      // Todos los pares deben tener fechas y ambos operadores con turno de trabajo ese día
      for(let i=0;i<swapPairs.length;i++){
        const p=swapPairs[i];
        if(!p.reqDate||!p.tgtDate){setErr(`Par ${i+1}: completa las dos fechas`);return false;}
        if(!isWorkShift(p.reqShift)){setErr(`Par ${i+1} (${p.reqDate}): no tienes un turno de trabajo ese día (${SHIFT_LABEL_FULL[p.reqShift]||'sin turno'}). Solo puedes ceder días con turno M/T/N/D.`);return false;}
        if(!isWorkShift(p.tgtShift)){setErr(`Par ${i+1} (${p.tgtDate}): tu compañero no trabaja ese día (${SHIFT_LABEL_FULL[p.tgtShift]||'sin turno'}). Solo se puede cambiar con días donde ambos tengáis turno M/T/N/D.`);return false;}
      }
      // Detectar pares duplicados
      const seen=new Set();
      for(let i=0;i<swapPairs.length;i++){
        const p=swapPairs[i];
        const k=`${p.reqDate}_${p.tgtDate}`;
        if(seen.has(k)){setErr(`Par ${i+1}: duplicado (${p.reqDate} ↔ ${p.tgtDate})`);return false;}
        seen.add(k);
      }
    }else if(modal==='asuntos'){
      if(!form.date1){setErr('Selecciona una fecha');return false;}
      const valErr=validateAsuntos(form.date1);
      if(valErr){setErr(valErr);return false;}
    }else{
      if(!form.date1||!form.date2){setErr('Indica fechas de inicio y fin');return false;}
      if(form.date2<form.date1){setErr('La fecha fin debe ser posterior al inicio');return false;}
    }
    return true;
  };

  const handleSubmitClick=()=>{
    if(validate())setConfirming(true);
  };

  const save=async()=>{
    setSaving(true);
    let reqType='';
    if(modal==='cambio'){
      reqType='swap';
      // Siempre generamos un swap_group_id — incluso para un único par — para que la
      // lógica de admin sea uniforme (agrupación, aprobación atómica)
      const groupId=genGroupId();
      const rows=swapPairs.map(p=>({
        request_type:'swap',
        requester_id:userId,
        target_id:form.targetId,
        requester_date:p.reqDate,
        requester_shift:p.reqShift,
        target_date:p.tgtDate,
        target_shift:p.tgtShift,
        status:'pending',
        notes:form.reason||null,
        swap_group_id:groupId,
      }));
      const{error:insErr}=await sb.from('shift_requests').insert(rows);
      if(insErr){setErr('Error al crear solicitud: '+insErr.message);setSaving(false);setConfirming(false);return;}
    }else if(modal==='asuntos'){
      reqType='personal_day';
      const {data:existing}=await sb.from('shift_requests').select('id').eq('requester_id',userId).eq('request_type','personal_day').in('status',['pending','approved']).limit(1);
      if(existing&&existing.length>0){setErr('Ya tienes una solicitud de asuntos propios este año (solo se permite 1)');setSaving(false);setConfirming(false);return;}
      await sb.from('shift_requests').insert({request_type:'personal_day',requester_id:userId,requester_date:form.date1,status:'pending',notes:form.reason||null});
    }else{
      reqType='vacation';
      await sb.from('shift_requests').insert({request_type:'vacation',requester_id:userId,vacation_start:form.date1,vacation_end:form.date2,vacation_year:2026,status:'pending',notes:form.reason||null});
    }
    await logAudit('request_created',{request_type:reqType,user:userName},userId);
    setSaving(false);onSaved();
  };

  const titles={cambio:'Solicitar cambio de turno',asuntos:'Solicitar día de asuntos propios',vacaciones:'Solicitar vacaciones'};

  // Resumen para la pantalla de confirmación
  const getSummary=()=>{
    if(modal==='cambio'){
      const target=emps.find(e=>e.id===form.targetId);
      return[
        {l:'Tipo',v:swapPairs.length>1?`Cambio múltiple (${swapPairs.length} días)`:'Cambio de turno'},
        {l:'Compañero',v:target?.full_name||'—'},
        {l:'Pares de cambio',v:'__swap_pairs__'}, // marcador especial — se renderiza como tabla
      ];
    }if(modal==='asuntos'){
      return[
        {l:'Tipo',v:'Día de asuntos propios'},
        {l:'Fecha',v:form.date1?new Date(form.date1+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}):'—'},
      ];
    }
    const dias=form.date1&&form.date2?Math.round((new Date(form.date2)-new Date(form.date1))/86400000)+1:0;
    return[
      {l:'Tipo',v:'Vacaciones'},
      {l:'Inicio',v:form.date1?new Date(form.date1+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}):'—'},
      {l:'Fin',v:form.date2?new Date(form.date2+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}):'—'},
      {l:'Días solicitados',v:`${dias} día${dias!==1?'s':''}`},
    ];
  };

  return(
    <div className="modal-overlay" onClick={()=>!confirming&&onClose()}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        {!confirming?(
          <>
            <div className="modal-title">{titles[modal]||''}</div>
            <div className="modal-sub">La solicitud quedará pendiente de aprobación</div>
            {err&&<div className="login-err">{err}</div>}
            {modal==='cambio'?(
              <>
                <div className="alert alert-info" style={{marginBottom:12,fontSize:11,lineHeight:1.5}}>
                  <span>ℹ️</span>
                  <span>Cedes un <strong>turno tuyo</strong> a cambio de un <strong>turno de tu compañero</strong>. Puedes añadir varios días (ej. semana completa). <u>Solo se permiten días donde ambos tenéis turno de trabajo</u> (M, T, N o D).</span>
                </div>
                <div className="fg"><label className="fl">Con quién cambias</label>
                  <select className="fs" value={form.targetId} onChange={e=>setForm(p=>({...p,targetId:e.target.value}))}>
                    <option value="">Seleccionar compañero...</option>
                    {emps.filter(e=>e.id!==userId&&e.active!==false).map(e=><option key={e.id} value={e.id}>{e.full_name}</option>)}
                  </select>
                </div>
                {form.targetId&&(
                  <>
                    <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text3)',margin:'16px 0 6px',paddingBottom:4,borderBottom:'1px solid var(--border)',fontWeight:600}}>
                      Días a cambiar {swapPairs.length>1&&`(${swapPairs.length})`}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {swapPairs.map((p,idx)=>{
                        const reqOk=!p.reqDate||isWorkShift(p.reqShift);
                        const tgtOk=!p.tgtDate||isWorkShift(p.tgtShift);
                        return(
                          <div key={p.id} style={{background:'var(--bg3)',borderRadius:6,padding:'10px 12px',border:`1px solid ${(reqOk&&tgtOk)?'var(--border)':'var(--red)'}`}}>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                              <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Par #{idx+1}</span>
                              {swapPairs.length>1&&<button onClick={()=>removePair(p.id)} style={{background:'transparent',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,padding:'0 4px'}}>✕ Eliminar</button>}
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                              <div>
                                <label style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:3}}>Tu día (cedes)</label>
                                <input className="fi" type="date" value={p.reqDate} onChange={e=>updatePair(p.id,'reqDate',e.target.value)} style={{fontSize:12}}/>
                                <div style={{fontSize:11,marginTop:4,minHeight:18,display:'flex',alignItems:'center',gap:6}}>
                                  {p.reqDate?(
                                    p.reqShift?(
                                      <>
                                        <span style={{padding:'2px 8px',borderRadius:3,background:SHIFT_COLOR[p.reqShift]||'var(--bg2)',color:'#fff',fontWeight:700,fontSize:11}}>{p.reqShift}</span>
                                        <span style={{color:isWorkShift(p.reqShift)?'var(--text3)':'var(--red)'}}>{SHIFT_LABEL_FULL[p.reqShift]||p.reqShift}</span>
                                      </>
                                    ):(
                                      <span style={{color:'var(--red)'}}>⚠ No tienes turno asignado</span>
                                    )
                                  ):(
                                    <span style={{color:'var(--text3)'}}>Selecciona fecha</span>
                                  )}
                                </div>
                              </div>
                              <div>
                                <label style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:3}}>Día suyo (trabajarás)</label>
                                <input className="fi" type="date" value={p.tgtDate} onChange={e=>updatePair(p.id,'tgtDate',e.target.value)} style={{fontSize:12}}/>
                                <div style={{fontSize:11,marginTop:4,minHeight:18,display:'flex',alignItems:'center',gap:6}}>
                                  {p.tgtDate?(
                                    p.tgtShift?(
                                      <>
                                        <span style={{padding:'2px 8px',borderRadius:3,background:SHIFT_COLOR[p.tgtShift]||'var(--bg2)',color:'#fff',fontWeight:700,fontSize:11}}>{p.tgtShift}</span>
                                        <span style={{color:isWorkShift(p.tgtShift)?'var(--text3)':'var(--red)'}}>{SHIFT_LABEL_FULL[p.tgtShift]||p.tgtShift}</span>
                                      </>
                                    ):(
                                      <span style={{color:'var(--red)'}}>⚠ Compañero sin turno ese día</span>
                                    )
                                  ):(
                                    <span style={{color:'var(--text3)'}}>Selecciona fecha</span>
                                  )}
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:'flex',gap:8,marginTop:10}}>
                      <button className="btn btn-ghost btn-sm" onClick={addPair} type="button">+ Añadir día</button>
                      <button className="btn btn-ghost btn-sm" onClick={addWeek} type="button" title="Toma el último par con fechas como base y añade los 6 días siguientes (consecutivos)">🗓 Completar semana (+6 días)</button>
                    </div>
                  </>
                )}
              </>
            ):modal==='asuntos'?(
              <>
                <div className="alert alert-info" style={{marginBottom:14,fontSize:11}}>
                  <span>ℹ️</span>
                  <span>Solo puedes solicitar 1 día al año · No puede ser lunes ni viernes · No puede ser adyacente a un festivo</span>
                </div>
                <div className="fg">
                  <label className="fl">Fecha del día de asuntos propios</label>
                  <input className="fi" type="date" value={form.date1} onChange={e=>{setForm(p=>({...p,date1:e.target.value}));setErr('');}}/>
                </div>
                {form.date1&&!validateAsuntos(form.date1)&&(
                  <div className="alert alert-ok" style={{fontSize:11,marginBottom:0}}>
                    <span>✓</span><span>Fecha válida — {new Date(form.date1+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</span>
                  </div>
                )}
                {form.date1&&validateAsuntos(form.date1)&&(
                  <div className="alert alert-warn" style={{fontSize:11,marginBottom:0}}>
                    <span>⚠</span><span>{validateAsuntos(form.date1)}</span>
                  </div>
                )}
              </>
            ):(
              <>
                <div className="frow">
                  <div className="fg"><label className="fl">Fecha inicio</label><input className="fi" type="date" value={form.date1} onChange={e=>setForm(p=>({...p,date1:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Fecha fin</label><input className="fi" type="date" value={form.date2} onChange={e=>setForm(p=>({...p,date2:e.target.value}))}/></div>
                </div>
                {form.date1&&form.date2&&form.date2>=form.date1&&(
                  <div className="alert alert-info" style={{fontSize:11,marginBottom:0}}>
                    <span>📅</span><span>{Math.round((new Date(form.date2)-new Date(form.date1))/86400000)+1} día(s) de vacaciones</span>
                  </div>
                )}
              </>
            )}
            <div className="fg" style={{marginTop:10}}>
              <label className="fl">Motivo de la solicitud</label>
              <textarea className="fi" placeholder="Indica el motivo de tu solicitud (opcional)..." rows={3}
                style={{resize:'vertical',minHeight:60,fontFamily:'inherit',lineHeight:1.4}}
                value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSubmitClick}>Revisar solicitud →</button>
            </div>
          </>
        ):(
          <>
            <div className="modal-title">Confirmar solicitud</div>
            <div className="modal-sub">Revisa los detalles antes de enviar</div>
            {err&&<div className="login-err">{err}</div>}
            <div className="card" style={{background:'var(--bg3)',marginBottom:16,padding:'14px 16px'}}>
              {getSummary().map(({l,v})=>(
                v==='__swap_pairs__'?(
                  <div key={l} style={{padding:'5px 0',borderBottom:'1px solid rgba(42,51,80,.2)',fontSize:12}}>
                    <div style={{color:'var(--text3)',marginBottom:6}}>{l}</div>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      {swapPairs.map((p,i)=>(
                        <div key={p.id} style={{display:'flex',gap:8,alignItems:'center',fontSize:12}}>
                          <span style={{color:'var(--text3)',minWidth:20}}>{i+1}.</span>
                          <span style={{minWidth:100}}>{p.reqDate?new Date(p.reqDate+'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'}):'?'}</span>
                          <span style={{padding:'1px 6px',borderRadius:3,background:SHIFT_COLOR[p.reqShift]||'var(--bg2)',color:'#fff',fontSize:10,fontWeight:700}}>{p.reqShift||'—'}</span>
                          <span style={{color:'var(--text3)'}}>↔</span>
                          <span style={{minWidth:100}}>{p.tgtDate?new Date(p.tgtDate+'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'}):'?'}</span>
                          <span style={{padding:'1px 6px',borderRadius:3,background:SHIFT_COLOR[p.tgtShift]||'var(--bg2)',color:'#fff',fontSize:10,fontWeight:700}}>{p.tgtShift||'—'}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ):(
                  <div key={l} style={{display:'flex',gap:12,padding:'5px 0',borderBottom:'1px solid rgba(42,51,80,.2)',fontSize:13}}>
                    <span style={{color:'var(--text3)',minWidth:130}}>{l}</span>
                    <span style={{fontWeight:500}}>{v}</span>
                  </div>
                )
              ))}
              {form.reason&&(
                <div style={{display:'flex',gap:12,padding:'5px 0',fontSize:13}}>
                  <span style={{color:'var(--text3)',minWidth:130}}>Motivo</span>
                  <span style={{fontStyle:'italic',color:'var(--text2)'}}>{form.reason}</span>
                </div>
              )}
            </div>
            <div className="alert alert-warn" style={{marginBottom:12}}>
              <span>⏳</span><span>Una vez enviada, quedará pendiente de aprobación por el administrador</span>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setConfirming(false)} disabled={saving}>← Editar</button>
              <button className="btn btn-primary" disabled={saving} onClick={save}>{saving?'Enviando…':'✓ Confirmar y enviar'}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── PROFILE VIEW ──────────────────────────────────────────────────────────────
function ProfileView({user,onUserUpdate}){
  const [photoUrl,setPhotoUrl]=useState(user.photo_url||'');
  const [dni,setDni]=useState(user.dni||'');
  const [email,setEmail]=useState(user.email||'');
  const [oldPass,setOldPass]=useState('');
  const [newPass,setNewPass]=useState('');
  const [newPass2,setNewPass2]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null); // {type:'ok'|'err', text}
  const [theme,setTheme]=useState(()=>localStorage.getItem('noc_theme')||'dark');
  const initials=(user.full_name||user.short_name||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  const toggleTheme=()=>{
    const next=theme==='dark'?'light':'dark';
    setTheme(next);
    try{localStorage.setItem('noc_theme',next);}catch(e){}
    document.body.className=next==='light'?'light-theme':'';
  };

  useEffect(()=>{
    sb.from('employees').select('dni,email,photo_url').eq('id',user.id).maybeSingle().then(({data})=>{
      if(data){
        if(data.dni!=null)setDni(data.dni||'');
        if(data.email!=null)setEmail(data.email||'');
        if(data.photo_url!=null)setPhotoUrl(data.photo_url||'');
      }
    });
  },[user.id]);

  const savePersonalData=async()=>{
    setSaving(true);setMsg(null);
    const {error}=await sb.from('employees').update({photo_url:photoUrl||null,dni:dni||null,email:email||null}).eq('id',user.id);
    if(error)setMsg({type:'err',text:'Error al guardar: '+error.message});
    else{setMsg({type:'ok',text:'Datos actualizados correctamente'});onUserUpdate({...user,photo_url:photoUrl||null,dni:dni||null,email:email||null});}
    setSaving(false);
  };

  const changePassword=async()=>{
    setMsg(null);
    if(!oldPass||!newPass||!newPass2){setMsg({type:'err',text:'Completa todos los campos'});return;}
    if(newPass!==newPass2){setMsg({type:'err',text:'Las contraseñas nuevas no coinciden'});return;}
    if(newPass.length<6){setMsg({type:'err',text:'La contraseña debe tener al menos 6 caracteres'});return;}
    setSaving(true);
    // Verificar contraseña actual re-autenticando
    const {error:signErr}=await sb.auth.signInWithPassword({email:user.email||'',password:oldPass});
    if(signErr){setMsg({type:'err',text:'La contraseña actual no es correcta'});setSaving(false);return;}
    // Actualizar contraseña en Supabase Auth
    const {error}=await sb.auth.updateUser({password:newPass});
    if(error)setMsg({type:'err',text:'Error al cambiar contraseña: '+error.message});
    else{setMsg({type:'ok',text:'Contraseña cambiada correctamente'});setOldPass('');setNewPass('');setNewPass2('');}
    setSaving(false);
  };

  return(
    <div style={{maxWidth:520}}>
      {msg&&<div className={msg.type==='ok'?'profile-success':'login-err'} style={{marginBottom:16}}>{msg.type==='ok'?'✓':' ⚠'} {msg.text}</div>}

      {/* Datos personales + foto */}
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header"><span className="card-title">Datos personales</span></div>
        <div style={{display:'flex',gap:24,alignItems:'flex-start',marginBottom:16}}>
          <div className="profile-avatar" title="Foto de perfil" style={{flexShrink:0}}>
            {photoUrl
              ?<img src={photoUrl} alt="avatar" onError={e=>{e.target.style.display='none';}}/>
              :initials
            }
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{user.full_name}</div>
            <div style={{fontSize:11,color:'var(--text3)',textTransform:'capitalize'}}>{user.role} · @{user.username}</div>
          </div>
        </div>
        <div className="frow">
          <div className="fg"><label className="fl">DNI / NIF</label>
            <input className="fi" placeholder="12345678A" value={dni} onChange={e=>setDni(e.target.value)}/>
          </div>
          <div className="fg"><label className="fl">Correo electrónico</label>
            <input className="fi" type="email" placeholder="nombre@avatel.es" value={email} onChange={e=>setEmail(e.target.value)}/>
          </div>
        </div>
        <button className="btn btn-primary btn-sm" disabled={saving} onClick={savePersonalData}>{saving?'Guardando…':'Guardar datos'}</button>
      </div>

      {/* Cambio de contraseña */}
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header"><span className="card-title">Cambiar contraseña</span></div>
        <div className="fg"><label className="fl">Contraseña actual</label>
          <input className="fi" type="password" placeholder="Tu contraseña actual" value={oldPass} onChange={e=>setOldPass(e.target.value)}/>
        </div>
        <div className="fg"><label className="fl">Nueva contraseña</label>
          <input className="fi" type="password" placeholder="Mínimo 6 caracteres" value={newPass} onChange={e=>setNewPass(e.target.value)}/>
        </div>
        <div className="fg"><label className="fl">Repetir nueva contraseña</label>
          <input className="fi" type="password" placeholder="Repite la nueva contraseña" value={newPass2} onChange={e=>setNewPass2(e.target.value)}/>
        </div>
        <button className="btn btn-primary" disabled={saving} onClick={changePassword}>{saving?'Guardando…':'Cambiar contraseña'}</button>
      </div>

      {/* Preferencias de apariencia */}
      <div className="card">
        <div className="card-header"><span className="card-title">Apariencia</span></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:13,fontWeight:500,marginBottom:3}}>Tema de la interfaz</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{theme==='dark'?'Tema oscuro activo':'Tema claro activo'}</div>
          </div>
          <button className="btn btn-ghost" onClick={toggleTheme} style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
            {theme==='dark'?'☀ Cambiar a claro':'🌙 Cambiar a oscuro'}
          </button>
        </div>
      </div>
    </div>
  );
}
